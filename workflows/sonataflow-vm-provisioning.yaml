---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
#
# Architecture:
#   SN CR approved → SN Business Rule fires:
#     1. POSTs CloudEvent (ce-sncrsysid=<cr_sys_id>) to SonataFlow route → resumes callback
#     2. POSTs to RHDH proxy /api/proxy/aap → RHDH adds AAP Bearer token → AAP provisions VM
#   SonataFlow tracks state only (no direct AAP call — RHDH owns that integration)
#
# SonataFlow route: vm-provisioning-approval-developer-hub.apps.cluster-k5zwd.dyn.redhatworkshops.io
# CloudEvent endpoint: POST / (root, binary format with ce-* headers)
# Correlation: ce-sncrsysid must match the sncrsysid input passed from the scaffolder template
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning with ServiceNow approval via Orchestrator
    sonataflow.org/profile: preview
spec:
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning — ServiceNow Approval
    description: >
      Tracks RHEL VM provisioning approval state. SN Business Rule signals this
      workflow AND triggers AAP via RHDH proxy when the CR is approved.
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      - name: logState
        type: custom
        operation: sysout

    events:
      - name: vmApprovalDecision
        source: servicenow
        type: vm.approval.decision
        correlation:
          - contextAttributeName: sncrsysid

    states:
      - name: Request Received
        type: inject
        data:
          workflow_status: Pending Manager Approval
        transition: Awaiting Manager Approval

      - name: Awaiting Manager Approval
        type: callback
        action:
          name: log-waiting
          functionRef:
            refName: logState
            arguments:
              message: Awaiting SN CR approval — SN will trigger AAP via RHDH on approval
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved} }'
          toStateData: .approvalResult
        transition: Evaluate Approval Decision

      - name: Evaluate Approval Decision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: VM Provisioning Started
            name: Approved
          - condition: '${ .approvalResult.approved == false }'
            transition: Request Rejected
            name: Rejected
        defaultCondition:
          transition: Request Rejected

      - name: VM Provisioning Started
        type: inject
        data:
          workflow_status: Approved - AAP provisioning VM via RHDH
        end:
          terminate: true

      - name: Request Rejected
        type: inject
        data:
          workflow_status: Rejected by Manager
        end:
          terminate: true
