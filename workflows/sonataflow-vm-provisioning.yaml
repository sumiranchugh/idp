---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
#
# Flow:
#   1. Scaffolder template starts workflow with sncrsysid = CR sys_id
#   2. Workflow enters callback state:
#      - Action PATCHes SN CR with callback URL + instance ID (via RHDH proxy)
#      - Waits for CloudEvent on /callback (quarkus-http connector)
#   3. Manager approves CR in ServiceNow
#   4. SN Business Rule fires:
#      - POSTs CloudEvent to callback URL with ce-kogitoprocrefid = instance ID
#   5. Workflow resumes → Provision VM via AAP (through RHDH proxy)
#   6. AAP provisions VM, updates SN records, then sends completion CloudEvent
#   7. Workflow receives completion on /callback-aap → marks as done
#
# Auth: SN_TO_RHDH_TOKEN env var from backstage-external-token-secret
#   AAP: quarkus.openapi-generator.aap_yaml.auth.bearerAuth.bearer-token
#   SN:  quarkus.openapi-generator.sn_yaml.auth.bearerAuth.bearer-token
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning with ServiceNow approval via Orchestrator
    sonataflow.org/profile: gitops
spec:
  podTemplate:
    container:
      image: image-registry.openshift-image-registry.svc:5000/developer-hub/vm-provisioning-approval@sha256:178d1c795b07ed0e6d7792f4774bedc27fc1042c6d1ad4b7a9be034fe32ecfcb
      envFrom:
        - secretRef:
            name: sonataflow-workflow-db-secret
        - secretRef:
            name: backstage-external-token-secret
  persistence:
    postgresql:
      secretRef:
        name: sonataflow-workflow-db-secret
        userKey: POSTGRES_USER
        passwordKey: POSTGRES_PASSWORD
      serviceRef:
        name: backstage-psql-developer-hub
        namespace: developer-hub
        databaseName: sonataflow_workflow
        port: 5432
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning
    description: >
      Self-service RHEL VM provisioning with ServiceNow approval.
      Uses HTTP callback pattern for both SN approval and AAP completion notifications.
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      - name: logState
        type: custom
        operation: sysout
      - name: storeCallbackInfo
        type: rest
        operation: specs/sn.yaml#updateCRCallbackInfo
      - name: triggerAAP
        type: rest
        operation: specs/aap.yaml#launchVMProvisioningJob

    events:
      - name: vmApprovalDecision
        source: servicenow
        type: vmApprovalDecision
        correlation:
          - contextAttributeName: sncrsysid
      - name: vmProvisioningComplete
        source: aap
        type: vmProvisioningComplete

    states:
      - name: Request Received
        type: inject
        data:
          workflow_status: Pending Manager Approval
        transition: Awaiting Manager Approval

      - name: Awaiting Manager Approval
        type: callback
        action:
          name: store-callback-info
          functionRef:
            refName: storeCallbackInfo
            arguments:
              sys_id: ${ .sncrsysid }
              u_workflow_instance_id: $WORKFLOW.instanceId
              u_callback_url: "https://vm-provisioning-approval-developer-hub.apps.cluster-k5zwd.dyn.redhatworkshops.io/callback"
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved} }'
          toStateData: .approvalResult
        transition: Evaluate Approval Decision

      - name: Evaluate Approval Decision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: Provision VM
            name: Approved
          - condition: '${ .approvalResult.approved == false }'
            transition: Request Rejected
            name: Rejected
        defaultCondition:
          transition: Request Rejected

      - name: Provision VM
        type: operation
        actions:
          - name: trigger-aap-job
            functionRef:
              refName: triggerAAP
              arguments:
                extra_vars:
                  vm_name: ${ .vm_name }
                  vm_namespace: ${ .vm_namespace }
                  vm_cpus: ${ .vm_cpus }
                  vm_memory: ${ .vm_memory }
                  vm_disk_size: ${ .vm_disk_size }
                  rhel_version: ${ .rhel_version }
                  vm_user: ${ .vm_user }
                  vm_password: redhat
                  ssh_public_key: '${ .ssh_public_key // "" }'
                  sn_request_number: ${ .sn_cr_number }
                  sn_cr_sys_id: ${ .sncrsysid }
                  sn_incident_sys_id: ${ .sn_incident_sys_id }
                  workflow_callback_url: "https://vm-provisioning-approval-developer-hub.apps.cluster-k5zwd.dyn.redhatworkshops.io/callback-aap"
                  workflow_instance_id: $WORKFLOW.instanceId
            actionDataFilter:
              results: .result
              toStateData: .aapJob
        stateDataFilter:
          output: '. + {"workflow_status": "VM Provisioning In Progress", "aap_job_id": (.aapJob.id // .aapJob.job | tostring)}'
        transition: Awaiting VM Provisioning

      - name: Awaiting VM Provisioning
        type: callback
        action:
          name: log-provisioning-started
          functionRef:
            refName: logState
            arguments:
              message: '"Waiting for VM provisioning to complete"'
        eventRef: vmProvisioningComplete
        eventDataFilter:
          data: '${ {vm_provisioned: .vm_provisioned, vm_status: .vm_status, ssh_service: .ssh_service} }'
          toStateData: .provisioningResult
        transition: VM Provisioned

      - name: VM Provisioned
        type: inject
        data:
          workflow_status: VM Provisioned
        end:
          terminate: true

      - name: Request Rejected
        type: inject
        data:
          workflow_status: Rejected by Manager
        end:
          terminate: true
