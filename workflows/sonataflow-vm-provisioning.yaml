---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
#
# Flow:
#   1. Scaffolder template starts workflow with sncrsysid = CR sys_id
#   2. Workflow waits in callback state for CloudEvent from SN Business Rule
#   3. Manager approves CR in ServiceNow
#   4. SN Business Rule (RHDH - Notify SonataFlow on CR Approval) fires:
#      - POSTs CloudEvent (ce-sncrsysid=<cr_sys_id>) to SonataFlow route → resumes callback
#   5. Workflow transitions to Provision VM:
#      - Calls RHDH proxy /api/proxy/aap/.../launch/ (auth: SN_TO_RHDH_TOKEN)
#      - RHDH adds AAP Bearer token (from plugin config) → AAP provisions VM
#
# Auth: SN_TO_RHDH_TOKEN env var from backstage-external-token-secret
#       Configured via: quarkus.openapi-generator.aap_yaml.auth.bearerAuth.bearer-token
#       per SonataFlow docs: https://sonataflow.org/serverlessworkflow/latest/security/authention-support-for-openapi-services.html
#
# CloudEvent endpoint: POST https://vm-provisioning-approval-developer-hub.apps.cluster-k5zwd.dyn.redhatworkshops.io/
# Correlation: ce-sncrsysid must match sncrsysid workflow input
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning with ServiceNow approval via Orchestrator
    sonataflow.org/profile: preview
spec:
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning — ServiceNow Approval
    description: >
      Waits for SN CR approval via CloudEvent callback, then calls RHDH proxy
      to trigger AAP VM provisioning. RHDH holds the AAP auth token.
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      - name: logState
        type: custom
        operation: sysout
      # REST function calls RHDH proxy; auth configured via SN_TO_RHDH_TOKEN env var
      # per SonataFlow auth docs: aap.yaml -> key aap_yaml, scheme bearerAuth, property bearer-token
      - name: triggerAAP
        type: rest
        operation: specs/aap.yaml#launchVMProvisioningJob

    events:
      - name: vmApprovalDecision
        source: servicenow
        type: vm.approval.decision
        correlation:
          - contextAttributeName: sncrsysid

    states:
      - name: Request Received
        type: inject
        data:
          workflow_status: Pending Manager Approval
        transition: Awaiting Manager Approval

      - name: Awaiting Manager Approval
        type: callback
        action:
          name: log-waiting
          functionRef:
            refName: logState
            arguments:
              message: Awaiting SN CR approval
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved} }'
          toStateData: .approvalResult
        transition: Evaluate Approval Decision

      - name: Evaluate Approval Decision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: Provision VM
            name: Approved
          - condition: '${ .approvalResult.approved == false }'
            transition: Request Rejected
            name: Rejected
        defaultCondition:
          transition: Request Rejected

      - name: Provision VM
        type: operation
        actions:
          - name: trigger-aap-job
            functionRef:
              refName: triggerAAP
              arguments:
                extra_vars:
                  vm_name: ${ .vm_name }
                  vm_namespace: ${ .vm_namespace }
                  vm_cpus: ${ .vm_cpus }
                  vm_memory: ${ .vm_memory }
                  vm_disk_size: ${ .vm_disk_size }
                  rhel_version: ${ .rhel_version }
                  vm_user: ${ .vm_user }
                  vm_password: redhat
                  ssh_public_key: '${ .ssh_public_key // "" }'
                  sn_request_number: ${ .sn_cr_number }
            actionDataFilter:
              results: .result
              toStateData: .aapJob
        stateDataFilter:
          output: >
            { "workflow_status": "VM Provisioning Started",
              "aap_job_id": (.aapJob.id // .aapJob.job | tostring) }
        end:
          terminate: true

      - name: Request Rejected
        type: inject
        data:
          workflow_status: Rejected by Manager
        end:
          terminate: true
