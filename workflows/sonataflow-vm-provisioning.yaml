---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
#
# Flow: SN CR approved → SN Business Rule POSTs CloudEvent to SonataFlow route
#       → SonataFlow resumes callback state → calls AAP via OpenAPI REST function
#
# CloudEvent correlation: ce-sncrsysid=<cr_sys_id> (must match sncrsysid workflow input)
# AAP auth: Bearer token in vm-provisioning-approval-props application.properties
# Route: vm-provisioning-approval-developer-hub.apps.cluster-k5zwd.dyn.redhatworkshops.io
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning with ServiceNow approval via Orchestrator
    sonataflow.org/profile: preview
spec:
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning — ServiceNow Approval
    description: >
      Waits for SN CR approval via CloudEvent callback, then triggers AAP
      via OpenAPI REST function to provision the RHEL VM.
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      - name: logState
        type: custom
        operation: sysout
      # AAP REST function — uses OpenAPI spec (direct URLs break Kogito codegen)
      # Auth: Bearer token in vm-provisioning-approval-props application.properties
      - name: triggerAAP
        type: rest
        operation: specs/aap.yaml#launchVMProvisioningJob

    events:
      # SN Business Rule POSTs CloudEvent with ce-sncrsysid=<cr_sys_id> on approval
      - name: vmApprovalDecision
        source: servicenow
        type: vm.approval.decision
        correlation:
          - contextAttributeName: sncrsysid

    states:
      - name: Request Received
        type: inject
        data:
          workflow_status: Pending Manager Approval
        transition: Awaiting Manager Approval

      # Callback: paused until SN sends CloudEvent to the workflow route
      - name: Awaiting Manager Approval
        type: callback
        action:
          name: log-waiting
          functionRef:
            refName: logState
            arguments:
              message: Awaiting ServiceNow CR approval CloudEvent
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved} }'
          toStateData: .approvalResult
        transition: Evaluate Approval Decision

      - name: Evaluate Approval Decision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: Provision VM
            name: Approved
          - condition: '${ .approvalResult.approved == false }'
            transition: Request Rejected
            name: Rejected
        defaultCondition:
          transition: Request Rejected

      # ── Trigger AAP via OpenAPI REST function ────────────────────────────
      - name: Provision VM
        type: operation
        actions:
          - name: trigger-aap-job
            functionRef:
              refName: triggerAAP
              arguments:
                extra_vars:
                  vm_name: ${ .vm_name }
                  vm_namespace: ${ .vm_namespace }
                  vm_cpus: ${ .vm_cpus }
                  vm_memory: ${ .vm_memory }
                  vm_disk_size: ${ .vm_disk_size }
                  rhel_version: ${ .rhel_version }
                  vm_user: ${ .vm_user }
                  vm_password: redhat
                  ssh_public_key: '${ .ssh_public_key // "" }'
                  sn_request_number: ${ .sn_cr_number }
            actionDataFilter:
              results: .result
              toStateData: .aapJob
        stateDataFilter:
          output: >
            { "workflow_status": "VM Provisioning Started",
              "vm_name": .vm_name,
              "aap_job_id": (.aapJob.id | tostring) }
        end:
          terminate: true

      - name: Request Rejected
        type: inject
        data:
          workflow_status: Rejected by Manager
        stateDataFilter:
          output: >
            { "status": "rejected",
              "vm_name": .vm_name,
              "sn_cr_number": .sn_cr_number,
              "message": .message }
        end:
          terminate: true
