---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
# Polls the ServiceNow CR every 30s for approval, then triggers AAP.
# URLs use env vars injected from secrets via spec.podTemplate.container.env.
# Auth headers are set in vm-provisioning-approval-props application.properties.
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning with ServiceNow approval via Orchestrator
    sonataflow.org/profile: preview
spec:
  podTemplate:
    container:
      env:
        - name: SERVICENOW_BASE_URL
          valueFrom:
            secretKeyRef:
              name: backstage-servicenow-secret
              key: SERVICENOW_BASE_URL
        - name: AAP_BASE_URL
          valueFrom:
            secretKeyRef:
              name: backstage-aap-secret
              key: AAP_BASE_URL
        - name: AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: backstage-aap-secret
              key: AAP_TOKEN

  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning — ServiceNow Approval
    description: >
      Polls the ServiceNow change request for manager approval, then provisions
      the RHEL VM via Ansible Automation Platform.
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      # GET change_request by sys_id — auth via application.properties basic auth
      - name: getSNCRStatus
        type: rest
        operation: >
          GET ${SERVICENOW_BASE_URL}/api/now/table/change_request/{sys_id}

      # POST to AAP job template — bearer token via application.properties
      - name: triggerAAP
        type: rest
        operation: >
          POST ${AAP_BASE_URL}/api/controller/v2/job_templates/9/launch/

    states:
      # ── Poll CR every 30s until approved or rejected ────────────────────
      - name: PollCRStatus
        type: operation
        actions:
          - name: get-cr-status
            functionRef:
              refName: getSNCRStatus
              arguments:
                sys_id: ${ .sn_cr_sys_id }
            actionDataFilter:
              results: .result
              toStateData: .crRecord
            sleep:
              before: PT30S
        stateDataFilter:
          output: >
            . + { "crApproval": .crRecord.approval }
        transition: CheckApproval

      # ── Branch on CR approval field ──────────────────────────────────────
      - name: CheckApproval
        type: switch
        dataConditions:
          - condition: '${ .crApproval == "approved" }'
            transition: ProvisionVM
            name: Approved
          - condition: '${ .crApproval == "rejected" }'
            transition: ApprovalRejected
            name: Rejected
        defaultCondition:
          transition: PollCRStatus

      # ── Trigger AAP job ──────────────────────────────────────────────────
      - name: ProvisionVM
        type: operation
        actions:
          - name: trigger-aap-job
            functionRef:
              refName: triggerAAP
              arguments:
                extra_vars:
                  vm_name: ${ .vm_name }
                  vm_namespace: ${ .vm_namespace }
                  vm_cpus: ${ .vm_cpus }
                  vm_memory: ${ .vm_memory }
                  vm_disk_size: ${ .vm_disk_size }
                  rhel_version: ${ .rhel_version }
                  vm_user: ${ .vm_user }
                  vm_password: redhat
                  ssh_public_key: '${ .ssh_public_key // "" }'
                  sn_request_number: ${ .sn_cr_number }
            actionDataFilter:
              results: .result
              toStateData: .aapJob
        stateDataFilter:
          output: >
            { "status": "provisioning",
              "vm_name": .vm_name,
              "sn_cr_number": .sn_cr_number,
              "aap_job_id": (.aapJob.id | tostring),
              "ssh_service": (.vm_name + "-ssh." + .vm_namespace + ".svc.cluster.local") }
        end:
          terminate: true

      # ── Approval rejected ────────────────────────────────────────────────
      - name: ApprovalRejected
        type: inject
        data:
          status: rejected
          message: VM provisioning request was rejected by the approver in ServiceNow
        stateDataFilter:
          output: >
            { "status": "rejected",
              "vm_name": .vm_name,
              "sn_cr_number": .sn_cr_number,
              "message": .message }
        end:
          terminate: true
