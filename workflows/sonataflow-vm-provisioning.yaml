---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
#
# Flow:
#   1. Scaffolder template starts workflow with sncrsysid = CR sys_id
#   2. Workflow enters callback state:
#      - Action PATCHes SN CR with callback URL + instance ID (via RHDH proxy)
#      - Waits for CloudEvent on /callback (quarkus-http connector)
#   3. Manager approves CR in ServiceNow
#   4. SN Business Rule fires:
#      - POSTs CloudEvent to callback URL with ce-kogitoprocrefid = instance ID
#   5. Workflow resumes → Provision VM via AAP (through RHDH proxy)
#   6. AAP provisions VM on OpenShift, sends completion CloudEvent
#   7. Workflow receives completion on /callback-aap
#   8. Workflow closes SN records: resolves incident, transitions CR to Closed
#
# Auth: SN_TO_RHDH_TOKEN env var from backstage-external-token-secret
#   AAP: quarkus.openapi-generator.aap_yaml.auth.bearerAuth.bearer-token
#   SN:  quarkus.openapi-generator.sn_yaml.auth.bearerAuth.bearer-token
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: __RHDH_NAMESPACE__
  annotations:
    sonataflow.org/description: RHEL VM provisioning with ServiceNow approval via Orchestrator
    sonataflow.org/profile: gitops
spec:
  podTemplate:
    container:
      image: quay.io/suchugh/vm-provisioning-approval@sha256:875c30919116a4fe74ce89a28402d89f81cad71e32f4e010e5f5d94d1a4cf704
      envFrom:
        - secretRef:
            name: sonataflow-workflow-db-secret
        - secretRef:
            name: backstage-external-token-secret
      volumeMounts:
        - name: workflow-specs
          mountPath: /deployments/specs
    volumes:
      - name: workflow-specs
        configMap:
          name: vm-provisioning-approval-specs
  persistence:
    postgresql:
      secretRef:
        name: sonataflow-workflow-db-secret
        userKey: POSTGRES_USER
        passwordKey: POSTGRES_PASSWORD
      serviceRef:
        name: backstage-psql-developer-hub
        namespace: __RHDH_NAMESPACE__
        databaseName: sonataflow_workflow
        port: 5432
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning
    description: >
      Self-service RHEL VM provisioning with ServiceNow approval.
      Uses HTTP callback pattern for both SN approval and AAP completion notifications.
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      - name: logState
        type: custom
        operation: sysout
      - name: storeCallbackInfo
        type: rest
        operation: specs/sn.yaml#updateCRCallbackInfo
      - name: triggerAAP
        type: rest
        operation: specs/aap.yaml#launchVMProvisioningJob
      - name: resolveIncident
        type: rest
        operation: specs/sn.yaml#resolveIncident
      - name: closeCR
        type: rest
        operation: specs/sn.yaml#updateCRCallbackInfo
      - name: createRepoFile
        type: rest
        operation: specs/catalog.yaml#createRepoFile
      - name: registerEntity
        type: rest
        operation: specs/catalog.yaml#registerCatalogLocation

    events:
      - name: vmApprovalDecision
        source: servicenow
        type: vmApprovalDecision
        correlation:
          - contextAttributeName: sncrsysid
      - name: vmProvisioningComplete
        source: aap
        type: vmProvisioningComplete

    states:
      - name: Request Received
        type: inject
        data:
          workflow_status: Pending Manager Approval
        transition: Awaiting Manager Approval

      - name: Awaiting Manager Approval
        type: callback
        action:
          name: store-callback-info
          functionRef:
            refName: storeCallbackInfo
            arguments:
              sys_id: ${ .sncrsysid }
              u_workflow_instance_id: $WORKFLOW.instanceId
              u_callback_url: "https://vm-provisioning-approval-developer-hub.__CLUSTER_DOMAIN__/callback"
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved} }'
          toStateData: .approvalResult
        transition: Evaluate Approval Decision

      - name: Evaluate Approval Decision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: Provision VM
            name: Approved
          - condition: '${ .approvalResult.approved == false }'
            transition: Request Rejected
            name: Rejected
        defaultCondition:
          transition: Request Rejected

      - name: Provision VM
        type: operation
        actions:
          - name: trigger-aap-job
            functionRef:
              refName: triggerAAP
              arguments:
                extra_vars:
                  vm_name: ${ .vm_name }
                  vm_namespace: ${ .vm_namespace }
                  vm_cpus: ${ .vm_cpus }
                  vm_memory: ${ .vm_memory }
                  vm_disk_size: ${ .vm_disk_size }
                  rhel_version: ${ .rhel_version }
                  vm_user: ${ .vm_user }
                  vm_password: redhat
                  ssh_public_key: '${ .ssh_public_key // "" }'
                  workflow_callback_url: "https://vm-provisioning-approval-developer-hub.__CLUSTER_DOMAIN__/callback-aap"
                  workflow_instance_id: $WORKFLOW.instanceId
            actionDataFilter:
              results: .result
              toStateData: .aapJob
        stateDataFilter:
          output: '. + {"workflow_status": "VM Provisioning In Progress", "aap_job_id": (.aapJob.id // .aapJob.job | tostring)}'
        transition: Awaiting VM Provisioning

      - name: Awaiting VM Provisioning
        type: callback
        action:
          name: log-provisioning-started
          functionRef:
            refName: logState
            arguments:
              message: '"Waiting for VM provisioning to complete"'
        eventRef: vmProvisioningComplete
        eventDataFilter:
          data: '${ {vm_provisioned: .vm_provisioned, vm_status: .vm_status, ssh_service: .ssh_service} }'
          toStateData: .provisioningResult
        transition: Register VM in Catalog

      - name: Register VM in Catalog
        type: operation
        actions:
          - name: create-repo-file
            functionRef:
              refName: createRepoFile
              arguments:
                filename: '${ .vm_name + ".yaml" }'
                message: '${ "Add catalog entity for VM " + .vm_name }'
                content: '${ ("apiVersion: backstage.io/v1alpha1\nkind: Resource\nmetadata:\n  name: " + .vm_name + "\n  namespace: default\n  title: \"RHEL VM: " + .vm_name + "\"\n  description: |\n    RHEL " + (.rhel_version // "9") + " VM provisioned via Developer Hub.\n  annotations:\n    backstage.io/kubernetes-id: " + .vm_name + "\n    backstage.io/kubernetes-namespace: " + (.vm_namespace // "vms") + "\n    orchestrator.backstage.io/workflow-id: vm-provisioning-approval\n  tags:\n    - vm\n    - rhel\nspec:\n  type: vm\n  lifecycle: production\n  owner: \"group:default/" + (.owner_group // "application-team") + "\"\n  system: openshift-virtualization\n  dependsOn:\n    - component:default/rhel-vm-provisioning\n") | @base64 }'
            actionDataFilter:
              toStateData: .repoFileResult
          - name: register-catalog-entity
            functionRef:
              refName: registerEntity
              arguments:
                type: url
                target: '${ "https://github.com/sumiranchugh/idp/blob/main/catalog/vms/" + .vm_name + ".yaml" }'
            actionDataFilter:
              toStateData: .catalogResult
        stateDataFilter:
          output: '. + {"workflow_status": "VM Registered in Catalog"}'
        transition: Close ServiceNow Records

      - name: Close ServiceNow Records
        type: operation
        actions:
          - name: resolve-incident
            functionRef:
              refName: resolveIncident
              arguments:
                sys_id: ${ .sn_incident_sys_id }
                state: "6"
                close_code: "Solution provided"
                close_notes: '${ "VM " + .provisioningResult.vm_name + " provisioned successfully. Status: " + (.provisioningResult.vm_status // "Running") + ". SSH: ssh " + (.vm_user // "cloud-user") + "@" + (.provisioningResult.ssh_service // "N/A") + ". Provisioned by: AAP / Red Hat Developer Hub." }'
            actionDataFilter:
              toStateData: .incidentResult
          - name: cr-to-scheduled
            functionRef:
              refName: closeCR
              arguments:
                sys_id: ${ .sncrsysid }
                state: "-2"
            actionDataFilter:
              toStateData: .crTransition1
          - name: cr-to-implement
            functionRef:
              refName: closeCR
              arguments:
                sys_id: ${ .sncrsysid }
                state: "-1"
            actionDataFilter:
              toStateData: .crTransition2
          - name: cr-to-review
            functionRef:
              refName: closeCR
              arguments:
                sys_id: ${ .sncrsysid }
                state: "0"
            actionDataFilter:
              toStateData: .crTransition3
          - name: cr-to-closed
            functionRef:
              refName: closeCR
              arguments:
                sys_id: ${ .sncrsysid }
                state: "3"
                close_code: "successful"
                close_notes: '${ "VM " + .provisioningResult.vm_name + " provisioned successfully. Automated by Red Hat Developer Hub Orchestrator." }'
            actionDataFilter:
              toStateData: .crTransition4
        stateDataFilter:
          output: '. + {"workflow_status": "ServiceNow Records Closed"}'
        transition: VM Provisioned

      - name: VM Provisioned
        type: inject
        data:
          workflow_status: VM Provisioned
        end:
          terminate: true

      - name: Request Rejected
        type: inject
        data:
          workflow_status: Rejected by Manager
        end:
          terminate: true
