---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-provisioning-approval-specs
  namespace: __RHDH_NAMESPACE__
data:
  aap.yaml: |
    openapi: "3.0.0"
    info:
      title: AAP via RHDH Proxy
      version: "1.0"
    servers:
      - url: "http://backstage-developer-hub.__RHDH_NAMESPACE__"
    components:
      securitySchemes:
        bearerAuth:
          type: http
          scheme: bearer
    security:
      - bearerAuth: []
    paths:
      /api/proxy/aap/api/controller/v2/job_templates/__AAP_JOB_TEMPLATE_ID__/launch/:
        post:
          operationId: launchVMProvisioningJob
          summary: Launch RHEL VM provisioning via RHDH proxy
          security:
            - bearerAuth: []
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    extra_vars:
                      type: object
          responses:
            "201":
              description: Job launched
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      id:
                        type: integer
                      job:
                        type: integer
            "202":
              description: Job launched (async)
  catalog.yaml: |
    openapi: "3.0.0"
    info:
      title: Catalog & GitHub API via RHDH Proxy
      version: "1.0"
    servers:
      - url: "http://backstage-developer-hub.__RHDH_NAMESPACE__"
    components:
      securitySchemes:
        bearerAuth:
          type: http
          scheme: bearer
    security:
      - bearerAuth: []
    paths:
      /api/proxy/github-api/gists:
        post:
          operationId: createGist
          summary: Create a GitHub Gist containing a catalog entity definition
          security:
            - bearerAuth: []
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    description:
                      type: string
                    public:
                      type: boolean
                    files:
                      type: object
          responses:
            "201":
              description: Gist created
              content:
                application/json:
                  schema:
                    type: object
      /api/catalog/locations:
        post:
          operationId: registerCatalogLocation
          summary: Register a catalog entity location
          security:
            - bearerAuth: []
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    type:
                      type: string
                    target:
                      type: string
          responses:
            "201":
              description: Location registered
              content:
                application/json:
                  schema:
                    type: object
  sn.yaml: |
    openapi: "3.0.0"
    info:
      title: ServiceNow via RHDH Proxy
      version: "1.0"
    servers:
      - url: "http://backstage-developer-hub.__RHDH_NAMESPACE__"
    components:
      securitySchemes:
        bearerAuth:
          type: http
          scheme: bearer
    security:
      - bearerAuth: []
    paths:
      /api/proxy/servicenow/api/now/table/change_request/{sys_id}:
        patch:
          operationId: updateCRCallbackInfo
          summary: Store callback URL and workflow instance ID in the SN Change Request
          security:
            - bearerAuth: []
          parameters:
            - name: sys_id
              in: path
              required: true
              schema:
                type: string
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    u_workflow_instance_id:
                      type: string
                    u_callback_url:
                      type: string
                    state:
                      type: string
                    close_code:
                      type: string
                    close_notes:
                      type: string
          responses:
            "200":
              description: CR updated
              content:
                application/json:
                  schema:
                    type: object
      /api/proxy/servicenow/api/now/table/incident/{sys_id}:
        patch:
          operationId: resolveIncident
          summary: Resolve a ServiceNow incident
          security:
            - bearerAuth: []
          parameters:
            - name: sys_id
              in: path
              required: true
              schema:
                type: string
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    state:
                      type: string
                    close_code:
                      type: string
                    close_notes:
                      type: string
          responses:
            "200":
              description: Incident updated
              content:
                application/json:
                  schema:
                    type: object
