---
# Catalog entity for RHEL VM provisioning infrastructure
# The servicenow.com/entity-id annotation links this entity to SN change requests
# SN change requests must have u_backstage_entity_id = "rhel-vm-provisioning"
# to appear in the ServiceNow tab on this entity page
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rhel-vm-provisioning
  namespace: default
  title: RHEL VM Provisioning Service
  description: >
    Self-service RHEL virtual machine provisioning via Red Hat Developer Hub,
    ServiceNow approval workflows, and Ansible Automation Platform.
  annotations:
    backstage.io/managed-by-location: url:https://github.com/sumiranchugh/idp/blob/main/catalog/vm-infrastructure.yaml
    # ServiceNow tab — shows ALL incidents with a backstage entity ID (aggregates all VMs)
    servicenow.com/entity-id: "rhel-vm-provisioning^ORu_backstage_entity_idISNOTEMPTY"
    # Links entity to the Orchestrator workflow tab (shows Workflows tab)
    orchestrator.backstage.io/workflow-id: vm-provisioning-approval
    # Kubernetes/Topology tab — shows ALL VMs provisioned by this service
    backstage.io/kubernetes-label-selector: provisioned-by=rhel-vm-provisioning
    backstage.io/kubernetes-namespace: vms
  tags:
    - vm
    - rhel
    - openshift-virtualization
    - ansible
    - servicenow
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: openshift-virtualization
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: openshift-virtualization
  namespace: default
  description: OpenShift Virtualization platform for RHEL VM workloads
  annotations:
    backstage.io/managed-by-location: url:https://github.com/sumiranchugh/idp/blob/main/developer-hub-config/catalog/vm-infrastructure.yaml
spec:
  owner: platform-team
