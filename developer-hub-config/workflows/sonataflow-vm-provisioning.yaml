---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
# Architecture:
#   1. RHDH template creates SN ticket + starts this workflow (passes sn_sys_id)
#   2. Workflow waits for CloudEvent callback from ServiceNow on approval
#   3. SN Business Rule POSTs CloudEvent to SonataFlow AND calls AAP to provision VM
#   4. Orchestrator UI shows live workflow status
#
# NOTE: REST calls are done externally (RHDH template & SN Business Rule)
# This workflow uses expression-type functions only (safest for compile)
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning workflow with ServiceNow approval tracking
    sonataflow.org/profile: preview
spec:
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning — ServiceNow Approval
    description: >
      Self-service RHEL VM provisioning with manager approval via ServiceNow.
      Submitted through Red Hat Developer Hub and orchestrated by Ansible Automation Platform.
    annotations:
      - 'workflow-type:infrastructure'
      - 'workflow-category:vm-provisioning'

    functions:
      - name: setStatus
        type: expression
        operation: '. + {}'

    events:
      - name: vmApprovalDecision
        source: servicenow
        type: vm.approval.decision
        correlation:
          - contextAttributeName: snincidentsysid

    states:
      - name: Request Received
        type: operation
        actions:
          - name: initialise
            functionRef:
              refName: setStatus
              arguments:
                workflow_status: pending_approval
            actionDataFilter:
              results: .init
              toStateData: .init
        stateDataFilter:
          output: >
            ${ . + {
              workflow_status: "Pending Manager Approval",
              vm: .vm_name,
              namespace: .vm_namespace,
              sn_change_request: .sn_number
            } }
        transition: Awaiting Manager Approval

      - name: Awaiting Manager Approval
        type: callback
        action:
          name: mark-waiting
          functionRef:
            refName: setStatus
            arguments:
              workflow_status: Awaiting Manager Approval in ServiceNow
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved, approvedBy: (.approvedBy // "unknown")} }'
          toStateData: .approvalResult
        transition: Evaluate Approval Decision

      - name: Evaluate Approval Decision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: Provisioning VM
            name: Approved by Manager
          - condition: '${ .approvalResult.approved == false }'
            transition: Request Rejected
            name: Rejected by Manager
        defaultCondition:
          transition: Request Rejected

      - name: Provisioning VM
        type: inject
        data:
          workflow_status: Approved — VM Provisioning Started via AAP
        stateDataFilter:
          output: >
            ${ . + {
              workflow_status: "Approved — VM Provisioning Started",
              approved_by: .approvalResult.approvedBy
            } }
        end:
          terminate: true

      - name: Request Rejected
        type: inject
        data:
          workflow_status: Rejected by Manager
        stateDataFilter:
          output: >
            ${ . + {
              workflow_status: "Rejected by Manager",
              rejected_by: .approvalResult.approvedBy
            } }
        end:
          terminate: true
