---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
# Uses inject + callback + switch states to avoid internal EmbeddedStart/Script nodes in UI
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning with ServiceNow approval via Orchestrator
    sonataflow.org/profile: preview
spec:
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning — ServiceNow Approval
    description: >
      Self-service RHEL VM provisioning with manager approval via ServiceNow Change Request.
      Submitted through Red Hat Developer Hub Orchestrator.
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      # sysout is built-in to SonataFlow — logs to stdout without creating embedded sub-flows
      - name: logState
        type: custom
        operation: sysout

    events:
      - name: vmApprovalDecision
        source: servicenow
        type: vm.approval.decision
        correlation:
          - contextAttributeName: snincidentsysid

    states:
      # inject state: no function, no embedded nodes — cleanest UI display
      - name: Request Received
        type: inject
        data:
          workflow_status: Pending Manager Approval
        transition: Awaiting Manager Approval

      # callback state: paused waiting for CloudEvent from SN Business Rule
      - name: Awaiting Manager Approval
        type: callback
        action:
          name: log-waiting
          functionRef:
            refName: logState
            arguments:
              message: Workflow paused — awaiting ServiceNow Change Request approval
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved, approvedBy: (.approvedBy // "approver")} }'
          toStateData: .approvalResult
        transition: Evaluate Approval Decision

      - name: Evaluate Approval Decision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: Provisioning VM
            name: Approved
          - condition: '${ .approvalResult.approved == false }'
            transition: Request Rejected
            name: Rejected
        defaultCondition:
          transition: Request Rejected

      - name: Provisioning VM
        type: inject
        data:
          workflow_status: Approved — VM Provisioning Started via AAP
        end:
          terminate: true

      - name: Request Rejected
        type: inject
        data:
          workflow_status: Rejected by Manager
        end:
          terminate: true
