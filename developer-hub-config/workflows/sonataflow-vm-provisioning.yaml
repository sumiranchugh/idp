---
# SonataFlow workflow — RHEL VM Provisioning with ServiceNow Approval
# Architecture:
#   1. RHDH template creates SN ticket + starts this workflow (passes sn_sys_id)
#   2. Workflow waits for CloudEvent callback from ServiceNow on approval
#   3. SN Business Rule POSTs CloudEvent to SonataFlow AND calls AAP to provision VM
#   4. Orchestrator UI shows live workflow status
#
# NOTE: REST calls are done externally (RHDH template & SN Business Rule)
# This workflow uses expression-type functions only (safest for compile)
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: vm-provisioning-approval
  namespace: developer-hub
  annotations:
    sonataflow.org/description: RHEL VM provisioning workflow with ServiceNow approval tracking
    sonataflow.org/profile: preview
spec:
  flow:
    id: vm-provisioning-approval
    version: '1.0'
    specVersion: '0.8'
    name: RHEL VM Provisioning with ServiceNow Approval
    description: Tracks VM provisioning request through ServiceNow approval and AAP provisioning
    annotations:
      - 'workflow-type:infrastructure'

    functions:
      - name: mergeData
        type: expression
        operation: '. + {}'

    events:
      - name: vmApprovalDecision
        source: servicenow
        type: vm.approval.decision
        correlation:
          - contextAttributeName: snincidentsysid

    states:
      - name: TrackRequest
        type: operation
        actions:
          - name: set-pending-status
            functionRef:
              refName: mergeData
              arguments:
                workflow_status: pending_approval
            actionDataFilter:
              results: .statusUpdate
              toStateData: .statusUpdate
        stateDataFilter:
          output: '${ . + {workflow_status: "pending_approval", sn_sys_id: .sn_sys_id, sn_number: .sn_number} }'
        transition: WaitForApproval

      - name: WaitForApproval
        type: callback
        action:
          name: set-waiting
          functionRef:
            refName: mergeData
            arguments:
              workflow_status: awaiting_manager_approval
        eventRef: vmApprovalDecision
        eventDataFilter:
          data: '${ {approved: .approved, approvedBy: (.approvedBy // "unknown"), rejectionReason: (.rejectionReason // "")} }'
          toStateData: .approvalResult
        transition: CheckDecision

      - name: CheckDecision
        type: switch
        dataConditions:
          - condition: '${ .approvalResult.approved == true }'
            transition: ProvisioningApproved
            name: Approved
          - condition: '${ .approvalResult.approved == false }'
            transition: ProvisioningRejected
            name: Rejected
        defaultCondition:
          transition: ProvisioningRejected

      - name: ProvisioningApproved
        type: inject
        data:
          workflow_status: approved_provisioning_started
          message: VM provisioning approved and started via AAP
        stateDataFilter:
          output: '${ . + {workflow_status: "approved_provisioning_started"} }'
        end:
          terminate: true

      - name: ProvisioningRejected
        type: inject
        data:
          workflow_status: rejected
          message: VM provisioning request was rejected
        stateDataFilter:
          output: '${ . + {workflow_status: "rejected"} }'
        end:
          terminate: true
