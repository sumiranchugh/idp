id: vm-provisioning-approval
version: '1.0'
specVersion: '0.8'
name: RHEL VM Provisioning with ServiceNow Approval
description: >
  Polls the ServiceNow change request for manager approval, then provisions
  the RHEL VM via Ansible Automation Platform.
annotations:
  - 'workflow-type:infrastructure'
dataInputSchema: schemas/vm-request.input-schema.json
extensions:
  - extensionid: workflow-output-schema
    outputSchema: schemas/vm-provisioning-output.schema.json

functions:
  - name: getSNCRStatus
    type: rest
    operation: >
      GET ${SERVICENOW_BASE_URL}/api/now/table/change_request/{sys_id}

  - name: triggerAAP
    type: rest
    operation: >
      POST ${AAP_URL}/api/controller/v2/job_templates/9/launch/

states:
  # ── Poll ServiceNow CR every 30s until approved or rejected ──────────────
  # Template passes sn_cr_sys_id; loops back here from CheckApproval when pending.
  - name: PollCRStatus
    type: operation
    actions:
      - name: get-cr-status
        functionRef:
          refName: getSNCRStatus
          arguments:
            sys_id: ${ .sn_cr_sys_id }
        actionDataFilter:
          results: .result
          toStateData: .crRecord
        sleep:
          before: PT30S
    stateDataFilter:
      output: ${ . + { "crApproval": .crRecord.approval } }
    transition: CheckApproval

  # ── Branch on CR approval field ───────────────────────────────────────────
  - name: CheckApproval
    type: switch
    dataConditions:
      - condition: ${ .crApproval == "approved" }
        transition: ProvisionVM
        name: Approved
      - condition: ${ .crApproval == "rejected" }
        transition: ApprovalRejected
        name: Rejected
    defaultCondition:
      transition: PollCRStatus

  # ── Provision VM via AAP ──────────────────────────────────────────────────
  - name: ProvisionVM
    type: operation
    actions:
      - name: trigger-aap-job
        functionRef:
          refName: triggerAAP
          arguments:
            extra_vars:
              vm_name: ${ .vm_name }
              vm_namespace: ${ .vm_namespace }
              vm_cpus: ${ .vm_cpus }
              vm_memory: ${ .vm_memory }
              vm_disk_size: ${ .vm_disk_size }
              rhel_version: ${ .rhel_version }
              vm_user: ${ .vm_user }
              vm_password: redhat
              ssh_public_key: ${ .ssh_public_key // "" }
              sn_request_number: ${ .sn_cr_number }
        actionDataFilter:
          results: .result
          toStateData: .aapJob
    stateDataFilter:
      output: >
        { "status": "provisioning",
          "vm_name": .vm_name,
          "vm_namespace": .vm_namespace,
          "sn_cr_number": .sn_cr_number,
          "aap_job_id": (.aapJob.id | tostring),
          "ssh_service": (.vm_name + "-ssh." + .vm_namespace + ".svc.cluster.local") }
    end:
      terminate: true

  # ── Approval rejected ─────────────────────────────────────────────────────
  - name: ApprovalRejected
    type: inject
    data:
      status: rejected
      message: VM provisioning request was rejected by the approver in ServiceNow
    stateDataFilter:
      output: >
        { "status": "rejected",
          "vm_name": .vm_name,
          "sn_cr_number": .sn_cr_number,
          "message": .message }
    end:
      terminate: true
