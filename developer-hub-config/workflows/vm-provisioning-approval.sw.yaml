id: vm-provisioning-approval
version: '1.0'
specVersion: '0.8'
name: RHEL VM Provisioning with ServiceNow Approval
description: >
  Orchestrates RHEL VM provisioning: creates a ServiceNow approval request,
  waits for manager approval via callback, then provisions the VM via AAP.
annotations:
  - 'workflow-type:infrastructure'
dataInputSchema: schemas/vm-request.input-schema.json
extensions:
  - extensionid: workflow-output-schema
    outputSchema: schemas/vm-provisioning-output.schema.json

functions:
  - name: createSNIncident
    type: rest
    operation: >
      POST ${SERVICENOW_BASE_URL}/api/now/table/incident

  - name: updateSNIncident
    type: rest
    operation: >
      PATCH ${SERVICENOW_BASE_URL}/api/now/table/incident

  - name: triggerAAP
    type: rest
    operation: >
      POST ${AAP_URL}/api/controller/v2/job_templates/9/launch/

events:
  - name: approvalDecision
    source: servicenow
    type: vm.approval.decision
    correlation:
      - contextAttributeName: snincidentsysid

states:
  # ── Step 1: Create ServiceNow incident ──────────────────────────────────
  - name: CreateSNRequest
    type: operation
    actions:
      - name: create-incident
        functionRef:
          refName: createSNIncident
          arguments:
            short_description: '${ "VM Request: " + .vm_name + " (RHEL " + .rhel_version + ")" }'
            description: >
              ${ "VM Provisioning Request from Red Hat Developer Hub\n\n" +
                 "VM: " + .vm_name + "\n" +
                 "Namespace: " + .vm_namespace + "\n" +
                 "RHEL: " + .rhel_version + "\n" +
                 "CPUs: " + (.vm_cpus|tostring) + "\n" +
                 "Memory: " + .vm_memory + "\n" +
                 "Disk: " + .vm_disk_size + "\n" +
                 "User: " + .vm_user + "\n\n" +
                 "Workflow Instance: " + $WORKFLOW.instanceId }
            category: infrastructure
            approval: requested
            state: "1"
            u_vm_name: ${ .vm_name }
            u_vm_namespace: ${ .vm_namespace }
            u_vm_rhel_version: ${ .rhel_version }
            u_vm_cpus: ${ .vm_cpus | tostring }
            u_vm_memory: ${ .vm_memory }
            u_vm_disk_size: ${ .vm_disk_size }
            u_vm_user: ${ .vm_user }
            u_aap_triggered: "false"
            u_workflow_instance: ${ $WORKFLOW.instanceId }
        actionDataFilter:
          results: .result
          toStateData: .snRequest
    stateDataFilter:
      output: >
        .  + { "snSysId": .snRequest.sys_id, "snNumber": .snRequest.number }
    transition: WaitForApproval

  # ── Step 2: Wait for ServiceNow approval ─────────────────────────────────
  # SN Business Rule POSTs a CloudEvent to SonataFlow when incident is approved.
  # The event must contain header: ce-snincidentsysid = <incident sys_id>
  - name: WaitForApproval
    type: callback
    action:
      functionRef:
        refName: createSNIncident   # no-op placeholder (callback states need an action)
        arguments: {}
    eventRef: approvalDecision
    eventDataFilter:
      data: ${ .approvalData }
      toStateData: .approvalResult
    transition: CheckApproval

  # ── Step 3: Branch on approval decision ─────────────────────────────────
  - name: CheckApproval
    type: switch
    dataConditions:
      - condition: ${ .approvalResult.approved == true }
        transition: ProvisionVM
        name: Approved
      - condition: ${ .approvalResult.approved == false }
        transition: ApprovalRejected
        name: Rejected
    defaultCondition:
      transition: ApprovalRejected

  # ── Step 4a: Provision VM via AAP ────────────────────────────────────────
  - name: ProvisionVM
    type: operation
    actions:
      - name: trigger-aap-job
        functionRef:
          refName: triggerAAP
          arguments:
            extra_vars:
              vm_name: ${ .vm_name }
              vm_namespace: ${ .vm_namespace }
              vm_cpus: ${ .vm_cpus }
              vm_memory: ${ .vm_memory }
              vm_disk_size: ${ .vm_disk_size }
              rhel_version: ${ .rhel_version }
              vm_user: ${ .vm_user }
              vm_password: redhat
              ssh_public_key: ${ .ssh_public_key // "" }
              sn_request_number: ${ .snNumber }
        actionDataFilter:
          results: .result
          toStateData: .aapJob
    stateDataFilter:
      output: >
        { "status": "provisioning",
          "vm_name": .vm_name,
          "vm_namespace": .vm_namespace,
          "sn_request": .snNumber,
          "aap_job_id": (.aapJob.id | tostring),
          "ssh_service": (.vm_name + "-ssh." + .vm_namespace + ".svc.cluster.local") }
    end:
      terminate: true

  # ── Step 4b: Approval rejected ───────────────────────────────────────────
  - name: ApprovalRejected
    type: inject
    data:
      status: rejected
      message: VM provisioning request was rejected by the approver in ServiceNow
    stateDataFilter:
      output: >
        { "status": "rejected",
          "vm_name": .vm_name,
          "sn_request": .snNumber,
          "message": .message }
    end:
      terminate: true
