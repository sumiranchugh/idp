---
# Custom Dynamic Plugins — RHDH 1.10.1
# Referenced via spec.application.dynamicPluginsConfigMapName: rhdh-custom-dynamic-plugins
# Rules (from RHDH docs):
#   - OCI images (oci://): NO integrity hash needed
#   - Local dist paths (./dynamic-plugins/dist/...): NO integrity hash needed
#   - npm packages: integrity hash REQUIRED
#   - Use {{inherit}} tag for Red Hat OCI images to auto-resolve correct version
apiVersion: v1
kind: ConfigMap
metadata:
  name: rhdh-custom-dynamic-plugins
  namespace: __RHDH_NAMESPACE__
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:

      # ── Notifications + Signals (dist, no hash needed) ───────────────────
      # Note: Orchestrator plugins are managed by spec.flavours (not here)
      - package: "./dynamic-plugins/dist/backstage-plugin-notifications"
        disabled: false

      - package: "./dynamic-plugins/dist/backstage-plugin-notifications-backend-dynamic"
        disabled: false

      - package: "./dynamic-plugins/dist/backstage-plugin-signals"
        disabled: false

      - package: "./dynamic-plugins/dist/backstage-plugin-signals-backend-dynamic"
        disabled: false

      # ── Topology (dist, no hash needed) ──────────────────────────────────
      - package: "./dynamic-plugins/dist/backstage-community-plugin-topology"
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-topology:
                mountPoints:
                  - mountPoint: entity.page.topology/cards
                    importName: TopologyPage
                    config:
                      layout:
                        gridColumn: 1 / -1
                        height: calc(100vh - 230px)

      # ── ArgoCD (OCI from ghcr.io, no hash needed) ────────────────────────
      # Frontend (npm with integrity — not available as OCI/dist)
      - package: "@roadiehq/backstage-plugin-argo-cd@2.5.0"
        disabled: false
        integrity: sha512-c058L/071JMavV2jdwbeVBFtuSH9fLsek+hav1vQKR8ZEWq3XIajD2+4IuRKMWGXx1dlyQvkh8MZnz9mmUA+Yw==
        pluginConfig:
          dynamicPlugins:
            frontend:
              roadiehq.backstage-plugin-argo-cd:
                dynamicRoutes:
                  - path: /argocd
                    importName: ArgocdPage
                    menuItem:
                      icon: CloudQueue
                      text: ArgoCD
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: EntityArgoCDOverviewCard

      # Backend (OCI from ghcr.io, enable from default config)
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-argo-cd-backend:bs_1.49.4__4.8.0"
        disabled: false

      # ── Kubernetes (dist, no hash needed) ────────────────────────────────
      - package: "./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic"
        disabled: false

      - package: "./dynamic-plugins/dist/backstage-plugin-kubernetes"
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage.plugin-kubernetes:
                dynamicRoutes:
                  - path: /kubernetes
                    importName: KubernetesPage
                    menuItem:
                      icon: CloudQueue
                      text: Kubernetes
                mountPoints:
                  - mountPoint: entity.page.kubernetes/cards
                    importName: EntityKubernetesContent
                    config:
                      layout:
                        gridColumn: 1 / -1

      # ── HTTP Scaffolder Action (dist, no hash needed) ─────────────────────
      # Action: roadiehq:utils:http:request
      # GA plugin per Dynamic_plugins_reference doc — use dist not npm
      - package: "./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic"
        disabled: false

      # ── ServiceNow Scaffolder (OCI ghcr.io, no hash needed) ──────────────
      # Community plugin — Actions: servicenow:now:table:createRecord, etc.
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-scaffolder-backend-module-servicenow:bs_1.49.4__2.15.1"
        disabled: false

      # ServiceNow backend — bs_1.49.4 matches RHDH 1.10.1 exactly
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-servicenow-backend:bs_1.45.3__1.5.1"
        disabled: false

      # ServiceNow frontend — bs_1.49.4__1.10.0 matches RHDH 1.10.1 Backstage version
      # This plugin uses new Module Federation format — no importName needed
      # The plugin self-registers its entity tab via callback when loaded
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-servicenow:bs_1.49.4__1.10.0"
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-servicenow:
                entityTabs:
                  - path: /servicenow
                    title: ServiceNow
                    mountPoint: entity.page.servicenow
                mountPoints:
                  - mountPoint: entity.page.servicenow/cards
                    importName: EntityServicenowContent
                    config:
                      layout:
                        gridColumn: 1 / -1

      # ── Ansible / AAP Plugins (OCI from registry.redhat.io) ──────────────
      # Requires rhdh-pull-secret with registry.redhat.io credentials
      # Tech Preview — syncs AAP job templates into catalog, adds /ansible sidebar
      # Frontend — Ansible sidebar page, learning paths, catalog views
      # Requires rhdh-pull-secret with registry.redhat.io credentials
      - package: "oci://registry.redhat.io/ansible-automation-platform/automation-portal:2.1!ansible-plugin-backstage-rhaap"
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              ansible.plugin-backstage-rhaap:
                appIcons:
                  - importName: AnsibleLogo
                    name: AnsibleLogo
                dynamicRoutes:
                  - importName: AnsiblePage
                    menuItem:
                      icon: AnsibleLogo
                      text: Ansible
                    path: /ansible
                entityTabs:
                  - path: /ansible
                    title: Ansible
                    mountPoint: entity.page.ansible
                mountPoints:
                  - mountPoint: entity.page.ansible/cards
                    importName: AnsiblePage
                    config:
                      layout:
                        gridColumn: 1 / -1

      # Backend — AAP catalog provider, syncs job templates as Resources
      - package: "oci://registry.redhat.io/ansible-automation-platform/automation-portal:2.1!ansible-plugin-backstage-rhaap-backend"
        disabled: false

      # Scaffolder actions — rhaap:* actions for launching AAP jobs from templates
      - package: "oci://registry.redhat.io/ansible-automation-platform/automation-portal:2.1!ansible-plugin-scaffolder-backend-module-backstage-rhaap"
        disabled: false

      # ── Keycloak Catalog Sync (dist, no hash needed) ─────────────────────
      - package: "./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic"
        disabled: false
        pluginConfig:
          catalog:
            providers:
              keycloakOrg:
                default:
                  baseUrl: __KEYCLOAK_BASE_URL__
                  realm: __KEYCLOAK_REALM__
                  loginRealm: __KEYCLOAK_REALM__
                  clientId: ${OAUTH_CLIENT_ID}
                  clientSecret: ${OAUTH_CLIENT_SECRET}
                  schedule:
                    frequency:
                      minutes: 2
                    timeout:
                      minutes: 1
                    initialDelay:
                      seconds: 15

      # ── RBAC Admin Console (dist, no hash needed) ─────────────────────────
      - package: "./dynamic-plugins/dist/backstage-community-plugin-rbac"
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-rbac:
                dynamicRoutes:
                  - path: /rbac
                    importName: RbacPage
                    menuItem:
                      icon: AdminPanelSettingsIcon
                      text: RBAC
                mountPoints:
                  - mountPoint: admin.page.rbac/cards
                    importName: RbacPage
