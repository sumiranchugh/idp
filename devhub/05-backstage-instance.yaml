---
apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: developer-hub
  namespace: __RHDH_NAMESPACE__
spec:
  flavours:
  - name: orchestrator
    enabled: true

  deployment:
    patch:
      spec:
        template:
          spec:
            volumes:
            - $patch: replace
              name: dynamic-plugins-root
              persistentVolumeClaim:
                claimName: dynamic-plugins-root

  application:
    replicas: 1
    dynamicPluginsConfigMapName: rhdh-custom-dynamic-plugins
    imagePullSecrets:
      - rhdh-pull-secret
    route:
      enabled: true
      tls:
        enabled: true
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

    extraEnvs:
      envs:
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
      secrets:
        - name: backstage-secrets
        - name: oauth-client
        - name: backstage-aap-secret
        - name: backstage-servicenow-secret
        - name: backstage-external-token-secret

    extraFiles:
      configMaps:
        - name: rbac-policy
          key: rbac-policy.csv
          mountPath: /opt/app-root/src
          containers:
            - backstage-backend

    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh

  database:
    enableLocalDb: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: __RHDH_NAMESPACE__
data:
  app-config-rhdh.yaml: |
    app:
      title: Red Hat Developer Hub
      baseUrl: https://__RHDH_ROUTE__

    organization:
      name: My Organization

    signInPage: oidc

    backend:
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
        externalAccess:
          - type: static
            options:
              token: ${SN_TO_RHDH_TOKEN}
              subject: servicenow-integration
      baseUrl: https://__RHDH_ROUTE__
      cors:
        origin: https://__RHDH_ROUTE__
        credentials: true
      csp:
        upgrade-insecure-requests: false

    auth:
      environment: production
      session:
        secret: ${BACKEND_SECRET}
      providers:
        oidc:
          production:
            prompt: login
            metadataUrl: __KEYCLOAK_BASE_URL__/realms/__KEYCLOAK_REALM__/.well-known/openid-configuration
            clientId: ${OAUTH_CLIENT_ID}
            clientSecret: ${OAUTH_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName

    servicenow:
      baseUrl: ${SERVICENOW_BASE_URL}
      instanceUrl: ${SERVICENOW_BASE_URL}
      username: ${SERVICENOW_USERNAME}
      password: ${SERVICENOW_PASSWORD}
      basicAuth:
        username: ${SERVICENOW_USERNAME}
        password: ${SERVICENOW_PASSWORD}

    permission:
      enabled: true
      rbac:
        policies-csv-file: /opt/app-root/src/rbac-policy.csv
        policyFileReload: true
        pluginsWithPermission:
          - orchestrator
          - kubernetes
          - topology
        admin:
          users:
            - name: user:default/__RHDH_SUPERADMIN__

    # Proxy configuration
    proxy:
      endpoints:
        # AAP proxy - used by direct-provision template
        /aap:
          target: ${AAP_BASE_URL}
          changeOrigin: true
          secure: false
          headers:
            Authorization: Bearer ${AAP_TOKEN}
        # ServiceNow proxy - used by approval-based template
        /servicenow:
          target: ${SN_BASE_URL}
          changeOrigin: true
          secure: true
          allowedMethods: ['GET', 'POST', 'PATCH', 'PUT', 'DELETE']
          headers:
            Authorization: Basic ${SN_BASIC_AUTH}

    # Ansible/AAP plugin configuration
    ansible:
      creatorService:
        baseUrl: 127.0.0.1
        port: '8000'
      rhaap:
        baseUrl: ${AAP_BASE_URL}
        token: ${AAP_TOKEN}
        checkSSL: false

    catalog:
      import:
        entityFilename: catalog-info.yaml
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group]

      locations:
        - type: url
          target: https://github.com/janus-idp/software-templates/blob/main/showcase-templates.yaml
        - type: url
          target: __GITHUB_REPO_BASE__/templates/create-vm-template.yaml
        - type: url
          target: __GITHUB_REPO_BASE__/templates/request-vm-servicenow-template.yaml
        - type: url
          target: __GITHUB_REPO_BASE__/catalog/platform-team.yaml
        - type: url
          target: __GITHUB_REPO_BASE__/catalog/vm-infrastructure.yaml
        # Ansible software templates (playbook/collection creators)
        - type: url
          target: https://github.com/ansible/ansible-rhdh-templates/blob/main/all.yaml

      # Auto-create user entities for OAuth users
      orphanStrategy: delete

      providers:
        # AAP catalog provider — syncs job templates into Backstage catalog
        rhaap:
          development:
            baseUrl: ${AAP_BASE_URL}
            authorization: "Bearer ${AAP_TOKEN}"
            orgs:
              - Default
            sync:
              jobTemplates:
                enabled: true
                schedule:
                  frequency:
                    minutes: 30
                  timeout:
                    minutes: 3
        ocm:
          env:
            name: production
            kubernetesPluginRef: local-cluster
            schedule:
              frequency:
                seconds: 10
              timeout:
                seconds: 60

    # Kubernetes/OpenShift integration
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      # Show OpenShift Virtualization VMs as custom resources in entity pages
      customResources:
        - group: kubevirt.io
          apiVersion: v1
          plural: virtualmachines
        - group: kubevirt.io
          apiVersion: v1
          plural: virtualmachineinstances
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: __CLUSTER_API_URL__
              name: local-cluster
              authProvider: serviceAccount
              skipTLSVerify: true
              serviceAccountToken: ${K8S_SERVICE_ACCOUNT_TOKEN}

    # Orchestrator Plugin Configuration
    orchestrator:
      dataIndexService:
        url: http://sonataflow-platform-data-index-service.developer-hub
      enabled: true

    # ArgoCD Plugin Configuration
    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: argocd
              url: https://argocd-server.argocd.svc.cluster.local
              # Optional: username and token for authentication
              # username: ${ARGOCD_USERNAME}
              # password: ${ARGOCD_PASSWORD}

    # Dynamic Plugins Configuration
    dynamicPlugins:
      frontend:
        janus-idp.backstage-plugin-orchestrator:
          entityTabs:
            - path: /workflows
              title: Workflows
              mountPoint: entity.page.workflows
          mountPoints:
            - mountPoint: entity.page.overview/cards
              importName: OrchestratorCard
              config:
                layout:
                  gridColumnEnd:
                    lg: "span 8"
                    md: "span 6"
                    xs: "span 4"
            - mountPoint: entity.page.workflows/cards
              importName: OrchestratorCatalogTab
              config:
                if:
                  allOf:
                    - hasAnnotation: orchestrator.backstage.io/workflow-id
            - mountPoint: search.page.types
              importName: OrchestratorSearchResultListItem

    # Enable required plugins
    enabled:
      kubernetes: true
      techdocs: true
      argocd: true
      github: false
      sonarqube: false
      orchestrator: true
      ocm: true

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage-kubernetes
  namespace: __RHDH_NAMESPACE__

---
# ClusterRole for Kubernetes plugin
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-kubernetes-reader
rules:
  - apiGroups:
      - '*'
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - deployments
      - replicasets
      - horizontalpodautoscalers
      - ingresses
      - statefulsets
      - daemonsets
      - cronjobs
      - jobs
      - limitranges
      - resourcequotas
      - endpoints
    verbs:
      - get
      - list
      - watch
  # OpenShift Virtualization — show VMs and their instances on the entity page
  - apiGroups:
      - kubevirt.io
    resources:
      - virtualmachines
      - virtualmachineinstances
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-kubernetes-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-kubernetes-reader
subjects:
  - kind: ServiceAccount
    name: backstage-kubernetes
    namespace: __RHDH_NAMESPACE__

