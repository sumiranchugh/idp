---
# RBAC Policy ConfigMap - All authenticated users are admins
apiVersion: v1
kind: ConfigMap
metadata:
  name: rbac-policy
  namespace: __RHDH_NAMESPACE__
data:
  rbac-policy.csv: |
    # ── Catalog permissions ───────────────────────────────────────────────
    p, role:default/admin, catalog-entity, read, allow
    p, role:default/admin, catalog-entity, create, allow
    p, role:default/admin, catalog-entity, update, allow
    p, role:default/admin, catalog-entity, delete, allow
    p, role:default/admin, catalog.entity.create, create, allow
    p, role:default/admin, catalog.entity.delete, delete, allow
    p, role:default/admin, catalog.entity.refresh, update, allow
    p, role:default/admin, catalog.location.create, create, allow
    p, role:default/admin, catalog.location.delete, delete, allow

    # ── Scaffolder permissions ────────────────────────────────────────────
    p, role:default/admin, scaffolder-template, read, allow
    p, role:default/admin, scaffolder-template, use, allow
    p, role:default/admin, scaffolder-action, use, allow
    p, role:default/admin, scaffolder.task.create, create, allow
    p, role:default/admin, scaffolder.task.read, read, allow
    p, role:default/admin, scaffolder.task.cancel, use, allow

    # ── Orchestrator permissions ──────────────────────────────────────────
    p, role:default/admin, orchestrator.workflow, read, allow
    p, role:default/admin, orchestrator.workflow.use, update, allow
    p, role:default/admin, orchestrator.workflowAdminView, read, allow
    p, role:default/admin, orchestrator.instanceAdminView, read, allow

    # ── Developer role — catalog (conditional) + scaffolder + orchestrator ──
    # catalog-entity read is conditional — see RBAC API condition below
    # Developers see only entities owned by their group + shared kinds (Template, System, etc.)
    p, role:default/developer, scaffolder-template, read, allow
    p, role:default/developer, scaffolder-template, use, allow
    p, role:default/developer, scaffolder-action, use, allow
    p, role:default/developer, scaffolder.task.create, create, allow
    p, role:default/developer, scaffolder.task.read, read, allow
    p, role:default/developer, scaffolder.task.cancel, use, allow
    p, role:default/developer, orchestrator.workflow, read, allow
    p, role:default/developer, orchestrator.workflow.use, update, allow

    # ── Kubernetes + Topology permissions ────────────────────────────────────────────
    p, role:default/admin, kubernetes.clusters.read, read, allow
    p, role:default/admin, kubernetes.resources.read, read, allow
    p, role:default/admin, kubernetes.proxy, use, allow
    p, role:default/developer, kubernetes.clusters.read, read, allow
    p, role:default/developer, kubernetes.resources.read, read, allow
    p, role:default/developer, kubernetes.proxy, use, allow
    p, role:default/admin, topology.view.read, read, allow
    p, role:default/developer, topology.view.read, read, allow

    # ── RBAC management (admin UI) ────────────────────────────────────────
    p, role:default/admin, policy.entity.read, read, allow
    p, role:default/admin, policy.entity.create, create, allow
    p, role:default/admin, policy.entity.update, update, allow
    p, role:default/admin, policy.entity.delete, delete, allow

    # ── Role assignments ──────────────────────────────────────────────────
    g, user:default/__RHDH_SUPERADMIN__, role:default/rbac_admin
    g, user:default/__RHDH_SUPERADMIN__, role:default/admin
    g, user:default/user1, role:default/developer
    g, user:default/user2, role:default/developer
