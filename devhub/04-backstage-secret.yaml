---
apiVersion: v1
kind: Secret
metadata:
  name: backstage-secrets
  namespace: developer-hub
type: Opaque
stringData:
  # Backend secret for session encryption - change this in production
  BACKEND_SECRET: "change-me-to-a-secure-random-string-min-24-chars"

  # PostgreSQL credentials for local database
  POSTGRES_PASSWORD: "backstage-password"
  POSTGRES_USER: "backstage"

  # GitHub token (optional, uncomment and add token if using GitHub integration)
  # GITHUB_TOKEN: "ghp_your_token_here"
