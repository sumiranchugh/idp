apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-rhel-vm
  title: Create RHEL VM
  description: |
    Internal template invoked by ServiceNow on approval.
    Provisions a RHEL VM via Ansible Automation Platform and registers it in the catalog.
  tags:
    - vm
    - rhel
    - openshift-virtualization
    - ansible
    - internal
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: VM Configuration
      required:
        - vm_name
        - vm_namespace
        - vm_cpus
        - vm_memory
        - vm_disk_size
        - rhel_version
      properties:
        vm_name:
          title: VM Name
          type: string
          description: Name for the virtual machine (lowercase, alphanumeric, hyphens)
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'Example: my-rhel-vm-01'

        vm_namespace:
          title: Namespace
          type: string
          description: OpenShift namespace where the VM will be created
          default: vms

        rhel_version:
          title: RHEL Version
          type: string
          description: Red Hat Enterprise Linux version
          default: '9'
          enum:
            - '9'
            - '8'
          enumNames:
            - 'RHEL 9 (Recommended)'
            - 'RHEL 8'

        vm_cpus:
          title: CPU Cores
          type: integer
          description: Number of virtual CPU cores
          default: 2
          minimum: 1
          maximum: 16

        vm_memory:
          title: Memory
          type: string
          description: Memory allocation
          default: 4Gi
          enum:
            - 2Gi
            - 4Gi
            - 8Gi
            - 16Gi
          enumNames:
            - '2 GiB'
            - '4 GiB (Default)'
            - '8 GiB'
            - '16 GiB'

        vm_disk_size:
          title: Disk Size
          type: string
          description: Root disk size
          default: 30Gi
          enum:
            - 30Gi
            - 50Gi
            - 100Gi
          enumNames:
            - '30 GiB (Default)'
            - '50 GiB'
            - '100 GiB'

        vm_user:
          title: VM Username
          type: string
          description: Default login username for the VM
          default: cloud-user

        ssh_public_key:
          title: SSH Public Key
          type: string
          description: Optional SSH public key for passwordless access
          ui:widget: textarea
          ui:options:
            rows: 3

        sn_request_number:
          title: ServiceNow Request Number
          type: string
          description: ServiceNow ticket that approved this request (auto-populated)
          default: ''

  steps:
    - id: trigger-aap
      name: Trigger VM Provisioning via Ansible Automation Platform
      action: http:backstage:request
      input:
        method: POST
        path: /api/proxy/aap/api/controller/v2/job_templates/9/launch/
        headers:
          content-type: application/json
        body:
          extra_vars:
            vm_name: ${{ parameters.vm_name }}
            vm_namespace: ${{ parameters.vm_namespace }}
            vm_cpus: ${{ parameters.vm_cpus }}
            vm_memory: ${{ parameters.vm_memory }}
            vm_disk_size: ${{ parameters.vm_disk_size }}
            rhel_version: "${{ parameters.rhel_version }}"
            vm_user: ${{ parameters.vm_user }}
            ssh_public_key: "${{ parameters.ssh_public_key | default('') }}"

    - id: log-job
      name: Log AAP Job
      action: debug:log
      input:
        message: |
          ✅ AAP Job launched!
          Job ID: ${{ steps['trigger-aap'].output.body.id }}
          Status: ${{ steps['trigger-aap'].output.body.status }}
          ServiceNow Request: ${{ parameters.sn_request_number }}

  output:
    links:
      - title: View VM Infrastructure
        url: /catalog/default/component/rhel-vm-provisioning
        icon: catalog
    text:
      - title: VM Provisioning Started
        content: |
          ## VM "${{ parameters.vm_name }}" Provisioning Started

          Approved via ServiceNow: **${{ parameters.sn_request_number }}**

          | Parameter | Value |
          |-----------|-------|
          | RHEL Version | ${{ parameters.rhel_version }} |
          | CPUs | ${{ parameters.vm_cpus }} |
          | Memory | ${{ parameters.vm_memory }} |
          | Disk | ${{ parameters.vm_disk_size }} |
          | Namespace | ${{ parameters.vm_namespace }} |
          | AAP Job ID | ${{ steps['trigger-aap'].output.body.id }} |

          **SSH access once ready (~5-10 min):**
          ```
          ssh -i <your_private_key> svc_${{ parameters.vm_name | replace('-', '_') }}@${{ parameters.vm_name }}-ssh.${{ parameters.vm_namespace }}.svc.cluster.local
          ```
          > Password-based SSH is disabled. Use your SSH key, or retrieve the VM password from the AAP job artifacts.
