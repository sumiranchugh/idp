apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: run-flask-app-on-rhel
  title: Run Flask App on RHEL VM
  description: |
    Self-service provisioning of a RHEL virtual machine with a Flask web application.
    Your request goes through ServiceNow for manager approval.
    Once approved, Ansible Automation Platform provisions the VM, installs Flask
    from PyPI, deploys the app, and creates a dedicated service account with SSH access.
  tags:
    - vm
    - rhel
    - openshift-virtualization
    - ansible
    - servicenow
    - approval
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: VM Configuration
      required:
        - vm_name
        - vm_namespace
        - vm_cpus
        - vm_memory
        - vm_disk_size
        - rhel_version
      properties:
        vm_name:
          title: VM Name
          type: string
          description: Name for the virtual machine (lowercase, alphanumeric, hyphens only)
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'Example: my-rhel-vm-01 (3-63 characters)'
          minLength: 3
          maxLength: 63

        vm_namespace:
          title: OpenShift Namespace
          type: string
          description: Namespace where the VM will be created
          default: vms
          ui:help: 'Must be a valid Kubernetes namespace name'

        rhel_version:
          title: RHEL Version
          type: string
          description: Red Hat Enterprise Linux version to use as the base image
          default: '9'
          enum:
            - '9'
            - '8'
          enumNames:
            - 'RHEL 9 (Latest — Recommended)'
            - 'RHEL 8 (Extended Support)'

        vm_cpus:
          title: CPU Cores
          type: integer
          description: Number of virtual CPU cores
          default: 2
          minimum: 1
          maximum: 16

        vm_memory:
          title: Memory
          type: string
          description: RAM allocation
          default: 4Gi
          enum:
            - 2Gi
            - 4Gi
            - 8Gi
            - 16Gi
            - 32Gi
          enumNames:
            - '2 GiB  — Light workloads'
            - '4 GiB  — Default'
            - '8 GiB  — Standard workloads'
            - '16 GiB — Heavy workloads'
            - '32 GiB — Data-intensive workloads'

        vm_disk_size:
          title: Root Disk Size
          type: string
          description: Size of the VM root disk
          default: 30Gi
          enum:
            - 30Gi
            - 50Gi
            - 100Gi
            - 200Gi
          enumNames:
            - '30 GiB  — Default'
            - '50 GiB  — Standard'
            - '100 GiB — Large'
            - '200 GiB — Extra Large'

    - title: Access & Purpose
      required:
        - justification
      properties:
        vm_user:
          title: VM Username
          type: string
          description: Default login user for the VM
          default: cloud-user

        ssh_public_key:
          title: SSH Public Key
          type: string
          description: Optional — paste your public key for passwordless SSH access
          ui:widget: textarea
          ui:options:
            rows: 3
          ui:help: 'Contents of ~/.ssh/id_rsa.pub'

        justification:
          title: Business Justification
          type: string
          description: Explain the purpose of this VM and how it will be used
          ui:widget: textarea
          ui:options:
            rows: 4
          ui:help: 'Required for manager approval. Be specific about the workload and expected duration.'

    - title: Review and Submit
      description: |
        ## Approval Process

        1. **Submit** — Your request is logged in ServiceNow as a Change Request
        2. **Manager Review** — Your manager receives an email to approve or reject
        3. **Auto-Provision** — On approval, Ansible Automation Platform provisions the VM automatically
        4. **Notification** — You receive an email with SSH access details when the VM is ready

        > Typical approval time: minutes to hours depending on your manager's availability.
        > VM provisioning takes approximately 5–10 minutes after approval.

  steps:
    # Step 1: Create Incident — visible in RHDH ServiceNow tab, tracks state
    - id: create-sn-incident
      name: Create ServiceNow Incident (for RHDH tracking)
      action: servicenow:now:table:createRecord
      input:
        tableName: incident
        requestBody:
          short_description: "Flask App on RHEL: ${{ parameters.vm_name }} (RHEL ${{ parameters.rhel_version }})"
          description: |
            VM Provisioning Request from Red Hat Developer Hub

            VM: ${{ parameters.vm_name }}
            Namespace: ${{ parameters.vm_namespace }}
            RHEL: ${{ parameters.rhel_version }}
            CPUs: ${{ parameters.vm_cpus }}
            Memory: ${{ parameters.vm_memory }}
            Disk: ${{ parameters.vm_disk_size }}
            User: ${{ parameters.vm_user }}

            Justification: ${{ parameters.justification }}
          category: infrastructure
          impact: "3"
          urgency: "3"
          state: "1"
          u_backstage_entity_id: rhel-vm-provisioning
          u_vm_name: ${{ parameters.vm_name }}
          u_vm_namespace: ${{ parameters.vm_namespace }}
          u_vm_rhel_version: "${{ parameters.rhel_version }}"
          u_vm_cpus: "${{ parameters.vm_cpus }}"
          u_vm_memory: ${{ parameters.vm_memory }}
          u_vm_disk_size: ${{ parameters.vm_disk_size }}
          u_vm_user: ${{ parameters.vm_user }}

    # Step 2: Create Change Request — has Approve/Reject UI for manager
    - id: create-sn-cr
      name: Create ServiceNow Change Request (for manager approval)
      action: servicenow:now:table:createRecord
      input:
        tableName: change_request
        requestBody:
          short_description: "Flask App on RHEL: ${{ parameters.vm_name }} (RHEL ${{ parameters.rhel_version }})"
          description: |
            VM Provisioning Request — approve to trigger automated provisioning.

            VM: ${{ parameters.vm_name }}
            Namespace: ${{ parameters.vm_namespace }}
            RHEL: ${{ parameters.rhel_version }}
            CPUs: ${{ parameters.vm_cpus }}
            Memory: ${{ parameters.vm_memory }}
            Disk: ${{ parameters.vm_disk_size }}
            User: ${{ parameters.vm_user }}

            Linked Incident: ${{ steps['create-sn-incident'].output.result.number }}
            Justification: ${{ parameters.justification }}
          justification: ${{ parameters.justification }}
          type: normal
          category: Other
          priority: "4"
          risk: "3"
          impact: "3"
          # Route to Application Development group — any member can approve
          assignment_group: 0a52d3dcd7011200f2d224837e6103f2
          # SN Change Management workflow resets state to New on creation;
          # we move it to Assess via a separate modifyRecord step below.
          u_incident_sys_id: ${{ steps['create-sn-incident'].output.result.sys_id }}
          u_backstage_entity_id: rhel-vm-provisioning
          u_vm_name: ${{ parameters.vm_name }}
          u_vm_namespace: ${{ parameters.vm_namespace }}
          u_vm_rhel_version: "${{ parameters.rhel_version }}"
          u_vm_cpus: "${{ parameters.vm_cpus }}"
          u_vm_memory: ${{ parameters.vm_memory }}
          u_vm_disk_size: ${{ parameters.vm_disk_size }}
          u_vm_user: ${{ parameters.vm_user }}
          u_aap_triggered: "false"

    # Step 3: Move CR to Assessment state so Approve/Reject buttons are visible
    # SN Change Management resets state to New on creation; we PATCH it to Assess (-4)
    # which makes the approval UI visible to Application Development group members.
    - id: move-cr-to-assess
      name: Move Change Request to Assessment
      action: servicenow:now:table:modifyRecord
      input:
        tableName: change_request
        sysId: ${{ steps['create-sn-cr'].output.result.sys_id }}
        requestBody:
          state: "-4"
          approval: requested

    # Step 4: Start Orchestrator workflow — tracks approval state
    - id: start-workflow
      name: Start Orchestrator Approval Workflow
      action: orchestrator:workflow:run
      input:
        workflow_id: vm-provisioning-approval
        # Link runs to the rhel-vm-provisioning component so they show in its Workflows tab
        target_entity: component:default/rhel-vm-provisioning
        parameters:
          vm_name: ${{ parameters.vm_name }}
          vm_namespace: ${{ parameters.vm_namespace }}
          rhel_version: "${{ parameters.rhel_version }}"
          vm_cpus: ${{ parameters.vm_cpus }}
          vm_memory: ${{ parameters.vm_memory }}
          vm_disk_size: ${{ parameters.vm_disk_size }}
          vm_user: ${{ parameters.vm_user }}
          ssh_public_key: "${{ parameters.ssh_public_key | default('') }}"
          sn_incident_sys_id: ${{ steps['create-sn-incident'].output.result.sys_id }}
          sn_incident_number: ${{ steps['create-sn-incident'].output.result.number }}
          sncrsysid: ${{ steps['create-sn-cr'].output.result.sys_id }}
          sn_cr_number: ${{ steps['create-sn-cr'].output.result.number }}
          sn_cr_url: ""
          sn_incident_url: ""
          owner_group: "${{ user.entity.spec.memberOf[0] | default('application-team') }}"

  output:
    links:
      - title: Track Workflow in Orchestrator
        url: ${{ steps['start-workflow'].output.instanceUrl }}
        icon: dashboard
      - title: ServiceNow Incident
        url: https://dev423121.service-now.com/nav_to.do?uri=incident.do?sys_id=${{ steps['create-sn-incident'].output.result.sys_id }}
        icon: alert
      - title: ServiceNow Change Request
        url: https://dev423121.service-now.com/nav_to.do?uri=change_request.do?sys_id=${{ steps['create-sn-cr'].output.result.sys_id }}
        icon: docs
    text:
      - title: Request Submitted for Approval
        content: |
          ## VM Request Submitted

          | Record | Number |
          |--------|--------|
          | Incident (RHDH tracking) | ${{ steps['create-sn-incident'].output.result.number }} |
          | Change Request (approval) | ${{ steps['create-sn-cr'].output.result.number }} |
          **Status:** Awaiting manager approval

          | Parameter | Value |
          |-----------|-------|
          | VM Name | `${{ parameters.vm_name }}` |
          | RHEL Version | ${{ parameters.rhel_version }} |
          | CPUs | ${{ parameters.vm_cpus }} |
          | Memory | ${{ parameters.vm_memory }} |
          | Disk | ${{ parameters.vm_disk_size }} |
          | Namespace | ${{ parameters.vm_namespace }} |

          ### What happens next

          1. Your manager receives an email from ServiceNow for approval
          2. On approval, ServiceNow triggers RHDH automatically
          3. AAP provisions the VM (~5-10 min after approval)
          4. The Orchestrator workflow tracks every step — click **Track Workflow** above
