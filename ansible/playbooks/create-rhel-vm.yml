---
- name: Create RHEL VM on OpenShift Virtualization
  hosts: localhost
  gather_facts: true

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ lookup('env', 'K8S_AUTH_HOST') | default('https://kubernetes.default.svc', true) }}"
      api_key: "{{ lookup('env', 'K8S_AUTH_API_KEY') }}"
      validate_certs: "{{ lookup('env', 'K8S_AUTH_VERIFY_SSL') | default(false, true) }}"

  vars:
    # Image configuration (RHEL boot source)
    # These are DataSources that should be pre-created in openshift-virtualization-os-images namespace
    rhel_image_map:
      "9": "rhel9"
      "8": "rhel8"

  tasks:
    - name: Set default values for undefined variables
      set_fact:
        vm_name: "{{ vm_name | default('rhel-vm-' + ansible_date_time.epoch) }}"
        vm_namespace: "{{ vm_namespace | default('vms') }}"
        vm_cpus: "{{ vm_cpus | default(2) }}"
        vm_memory: "{{ vm_memory | default('4Gi') }}"
        vm_disk_size: "{{ vm_disk_size | default('50Gi') }}"
        rhel_version: "{{ rhel_version | default('9') }}"
        storage_class: "{{ storage_class | default('ocs-external-storagecluster-ceph-rbd') }}"
        vm_network: "{{ vm_network | default('default') }}"
        vm_user: "{{ vm_user | default('cloud-user') }}"
        vm_password: "{{ vm_password | default('redhat') }}"
        ssh_public_key: "{{ ssh_public_key | default('') }}"
        expose_vm: "{{ expose_vm | default(false) }}"

    - name: Ensure namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ vm_namespace }}"

    - name: Build VM definition with proper types
      set_fact:
        vm_definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
              os: "rhel{{ rhel_version }}"
              kubevirt.io/vm: "{{ vm_name }}"
              # Backstage Kubernetes plugin label — links this VM to the rhel-vm-provisioning component
              backstage.io/kubernetes-id: rhel-vm-provisioning
          spec:
            dataVolumeTemplates:
              - apiVersion: cdi.kubevirt.io/v1beta1
                kind: DataVolume
                metadata:
                  name: "{{ vm_name }}-disk"
                spec:
                  sourceRef:
                    kind: DataSource
                    name: "{{ rhel_image_map[rhel_version] }}"
                    namespace: openshift-virtualization-os-images
                  storage:
                    resources:
                      requests:
                        storage: "{{ vm_disk_size }}"
            running: true
            template:
              metadata:
                labels:
                  kubevirt.io/domain: "{{ vm_name }}"
                  app: "{{ vm_name }}"
              spec:
                domain:
                  cpu:
                    cores: "{{ vm_cpus | int }}"
                    sockets: 1
                    threads: 1
                  devices:
                    disks:
                      - disk:
                          bus: virtio
                        name: rootdisk
                      - disk:
                          bus: virtio
                        name: cloudinitdisk
                    interfaces:
                      - masquerade: {}
                        name: default
                    rng: {}
                  memory:
                    guest: "{{ vm_memory }}"
                  resources: {}
                networks:
                  - name: default
                    pod: {}
                terminationGracePeriodSeconds: 180
                volumes:
                  - dataVolume:
                      name: "{{ vm_name }}-disk"
                    name: rootdisk
                  - cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: {{ vm_user }}
                        password: {{ vm_password }}
                        chpasswd: { expire: False }
                        {% if ssh_public_key != '' %}
                        ssh_authorized_keys:
                          - {{ ssh_public_key }}
                        {% endif %}
                        ssh_pwauth: true
                        disable_root: false
                        package_update: true
                        package_upgrade: false
                        packages:
                          - vim
                          - git
                          - curl
                          - wget
                          - net-tools
                        timezone: UTC
                        hostname: {{ vm_name }}
                        fqdn: {{ vm_name }}.{{ vm_namespace }}.svc.cluster.local
                        final_message: "RHEL VM {{ vm_name }} is ready!"
                    name: cloudinitdisk

    - name: Fix cores to be integer not string
      set_fact:
        vm_definition: "{{ vm_definition | combine({'spec': {'template': {'spec': {'domain': {'cpu': {'cores': vm_cpus | int, 'sockets': 1, 'threads': 1}}}}}}, recursive=True) }}"

    - name: Create VirtualMachine with DataVolumeTemplate
      kubernetes.core.k8s:
        state: present
        definition: "{{ vm_definition }}"
      register: vm_created

    - name: Wait for VM to be ready
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: "{{ vm_name }}"
        namespace: "{{ vm_namespace }}"
      register: vm_status
      until:
        - vm_status.resources | length > 0
        - vm_status.resources[0].status.ready is defined
        - vm_status.resources[0].status.ready == true
      retries: 60
      delay: 10

    - name: Get VirtualMachineInstance info
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        name: "{{ vm_name }}"
        namespace: "{{ vm_namespace }}"
      register: vmi_info

    - name: Create Service for VM SSH access
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ vm_name }}-ssh"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
          spec:
            type: ClusterIP
            selector:
              kubevirt.io/vm: "{{ vm_name }}"
            ports:
              - name: ssh
                port: 22
                targetPort: 22
                protocol: TCP

    - name: Create Route for SSH access (optional)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ vm_name }}-ssh"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
          spec:
            to:
              kind: Service
              name: "{{ vm_name }}-ssh"
            port:
              targetPort: ssh
            tls:
              termination: passthrough
      when: expose_ssh_route | default(false) | bool

    - name: Output VM details
      ansible.builtin.debug:
        msg:
          - "================================================"
          - "VM Created Successfully!"
          - "================================================"
          - "VM Name: {{ vm_name }}"
          - "Namespace: {{ vm_namespace }}"
          - "CPUs: {{ vm_cpus }}"
          - "Memory: {{ vm_memory }}"
          - "Disk Size: {{ vm_disk_size }}"
          - "RHEL Version: {{ rhel_version }}"
          - "Status: {{ vm_status.resources[0].status.printableStatus | default('Starting') }}"
          - "Ready: {{ vm_status.resources[0].status.ready | default(false) }}"
          - ""
          - "Access Information:"
          - "  Username: {{ vm_user }}"
          - "  Password: {{ vm_password }}"
          - "  SSH Service: {{ vm_name }}-ssh.{{ vm_namespace }}.svc.cluster.local"
          - ""
          - "Connect from inside cluster:"
          - "  ssh {{ vm_user }}@{{ vm_name }}-ssh.{{ vm_namespace }}.svc.cluster.local"
          - "================================================"

    - name: Set stats for AAP/Developer Hub
      ansible.builtin.set_stats:
        data:
          vm_name: "{{ vm_name }}"
          vm_namespace: "{{ vm_namespace }}"
          vm_cpus: "{{ vm_cpus }}"
          vm_memory: "{{ vm_memory }}"
          vm_disk_size: "{{ vm_disk_size }}"
          rhel_version: "{{ rhel_version }}"
          vm_ready: "{{ vm_status.resources[0].status.ready | default(false) }}"
          vm_status: "{{ vm_status.resources[0].status.printableStatus | default('Unknown') }}"
          ssh_service: "{{ vm_name }}-ssh.{{ vm_namespace }}.svc.cluster.local"

    # ── Update ServiceNow records on successful provisioning ──────────────
    # ── Notify RHDH catalog to refresh (so new VM shows in K8s tab) ──────────
    # NOTE: Per-VM Backstage Component entities require writing catalog-info.yaml
    # to a Git repository that RHDH monitors. Configure AAP with GitHub credentials
    # and add a playbook step to commit catalog/vms/{{ vm_name }}.yaml to the idp repo.
    # For now, VMs appear in the Kubernetes tab of the rhel-vm-provisioning component
    # via the backstage.io/kubernetes-id=rhel-vm-provisioning label on the VM resource.

    - name: Resolve ServiceNow Incident
      uri:
        url: "https://dev423121.service-now.com/api/now/table/incident/{{ sn_incident_sys_id }}"
        method: PATCH
        body_format: json
        headers:
          Authorization: "Basic {{ servicenow_auth | default('YWRtaW46WXMrRXhUbDdQeioz') }}"
          Content-Type: application/json
        body:
          state: "6"
          close_code: "Solution provided"
          close_notes: >
            VM {{ vm_name }} successfully provisioned.
            Status: {{ vm_status.resources[0].status.printableStatus | default('Running') }}
            SSH: ssh {{ vm_user | default('cloud-user') }}@{{ vm_name }}-ssh.{{ vm_namespace }}.svc.cluster.local
            Provisioned by: Ansible Automation Platform / Red Hat Developer Hub
        status_code: [200, 201, 204]
        validate_certs: false
      when: sn_incident_sys_id is defined and sn_incident_sys_id | length > 0
      ignore_errors: true

    - name: Close ServiceNow Change Request
      uri:
        url: "https://dev423121.service-now.com/api/now/table/change_request/{{ sn_cr_sys_id }}"
        method: PATCH
        body_format: json
        headers:
          Authorization: "Basic {{ servicenow_auth | default('YWRtaW46WXMrRXhUbDdQeioz') }}"
          Content-Type: application/json
        body:
          state: "3"
          close_code: "successful"
          close_notes: >
            VM {{ vm_name }} provisioned successfully.
            Automated by Ansible Automation Platform.
        status_code: [200, 201, 204]
        validate_certs: false
      when: sn_cr_sys_id is defined and sn_cr_sys_id | length > 0
      ignore_errors: true
