---
- name: Create RHEL VM on OpenShift Virtualization
  hosts: localhost
  gather_facts: true

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ lookup('env', 'K8S_AUTH_HOST') | default('https://kubernetes.default.svc', true) }}"
      api_key: "{{ lookup('env', 'K8S_AUTH_API_KEY') }}"
      validate_certs: "{{ lookup('env', 'K8S_AUTH_VERIFY_SSL') | default(false, true) }}"

  vars:
    # Image configuration (RHEL boot source)
    # These are DataSources that should be pre-created in openshift-virtualization-os-images namespace
    rhel_image_map:
      "9": "rhel9"
      "8": "rhel8"

  tasks:
    - name: Set default values for undefined variables
      set_fact:
        vm_name: "{{ vm_name | default('rhel-vm-' + ansible_date_time.epoch) }}"
        vm_namespace: "{{ vm_namespace | default('vms') }}"
        vm_cpus: "{{ vm_cpus | default(2) }}"
        vm_memory: "{{ vm_memory | default('4Gi') }}"
        vm_disk_size: "{{ vm_disk_size | default('50Gi') }}"
        rhel_version: "{{ rhel_version | default('9') }}"
        storage_class: "{{ storage_class | default('ocs-external-storagecluster-ceph-rbd') }}"
        vm_network: "{{ vm_network | default('default') }}"
        vm_user: "{{ vm_user | default('cloud-user') }}"
        vm_password: "{{ vm_password | default('redhat') }}"
        ssh_public_key: "{{ ssh_public_key | default('') }}"
        expose_vm: "{{ expose_vm | default(false) }}"

    - name: Ensure namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ vm_namespace }}"

    - name: Build VM definition with proper types
      set_fact:
        vm_definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
              os: "rhel{{ rhel_version }}"
              vm.kubevirt.io/name: "{{ vm_name }}"
              # Backstage Kubernetes plugin label — links this VM to the rhel-vm-provisioning component
              backstage.io/kubernetes-id: rhel-vm-provisioning
          spec:
            dataVolumeTemplates:
              - apiVersion: cdi.kubevirt.io/v1beta1
                kind: DataVolume
                metadata:
                  name: "{{ vm_name }}-disk"
                spec:
                  sourceRef:
                    kind: DataSource
                    name: "{{ rhel_image_map[rhel_version] }}"
                    namespace: openshift-virtualization-os-images
                  storage:
                    resources:
                      requests:
                        storage: "{{ vm_disk_size }}"
            running: true
            template:
              metadata:
                labels:
                  kubevirt.io/domain: "{{ vm_name }}"
                  app: "{{ vm_name }}"
              spec:
                domain:
                  cpu:
                    cores: "{{ vm_cpus | int }}"
                    sockets: 1
                    threads: 1
                  devices:
                    disks:
                      - disk:
                          bus: virtio
                        name: rootdisk
                      - disk:
                          bus: virtio
                        name: cloudinitdisk
                    interfaces:
                      - masquerade: {}
                        name: default
                    rng: {}
                  memory:
                    guest: "{{ vm_memory }}"
                  resources: {}
                networks:
                  - name: default
                    pod: {}
                terminationGracePeriodSeconds: 180
                volumes:
                  - dataVolume:
                      name: "{{ vm_name }}-disk"
                    name: rootdisk
                  - cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: {{ vm_user }}
                        password: {{ vm_password }}
                        chpasswd: { expire: False }
                        {% if ssh_public_key != '' %}
                        ssh_authorized_keys:
                          - {{ ssh_public_key }}
                        {% endif %}
                        ssh_pwauth: true
                        disable_root: false
                        package_update: false
                        package_upgrade: false
                        timezone: UTC
                        hostname: {{ vm_name }}
                        fqdn: {{ vm_name }}.{{ vm_namespace }}.svc.cluster.local
                        final_message: "RHEL VM {{ vm_name }} is ready!"
                    name: cloudinitdisk

    - name: Fix cores to be integer not string
      set_fact:
        vm_definition: "{{ vm_definition | combine({'spec': {'template': {'spec': {'domain': {'cpu': {'cores': vm_cpus | int, 'sockets': 1, 'threads': 1}}}}}}, recursive=True) }}"

    - name: Create VirtualMachine with DataVolumeTemplate
      kubernetes.core.k8s:
        state: present
        definition: "{{ vm_definition }}"
      register: vm_created

    - name: Wait for VM to be ready
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: "{{ vm_name }}"
        namespace: "{{ vm_namespace }}"
      register: vm_status
      until:
        - vm_status.resources | length > 0
        - vm_status.resources[0].status.ready is defined
        - vm_status.resources[0].status.ready == true
      retries: 60
      delay: 10

    - name: Get VirtualMachineInstance info
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachineInstance
        name: "{{ vm_name }}"
        namespace: "{{ vm_namespace }}"
      register: vmi_info

    - name: Create Service for VM SSH access
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ vm_name }}-ssh"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
              backstage.io/kubernetes-id: rhel-vm-provisioning
          spec:
            type: ClusterIP
            selector:
              vm.kubevirt.io/name: "{{ vm_name }}"
            ports:
              - name: ssh
                port: 22
                targetPort: 22
                protocol: TCP

    - name: Create HTTP Service for NGINX app
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ vm_name }}-http"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
              backstage.io/kubernetes-id: rhel-vm-provisioning
          spec:
            type: ClusterIP
            selector:
              vm.kubevirt.io/name: "{{ vm_name }}"
            ports:
              - name: http
                port: 80
                targetPort: 80
                protocol: TCP

    - name: Create Route for NGINX app
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ vm_name }}"
            namespace: "{{ vm_namespace }}"
            labels:
              app: "{{ vm_name }}"
              backstage.io/kubernetes-id: rhel-vm-provisioning
          spec:
            to:
              kind: Service
              name: "{{ vm_name }}-http"
            port:
              targetPort: http
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Allow

    - name: Derive service account name
      set_fact:
        service_account_user: "svc_{{ vm_name | regex_replace('-', '_') }}"
        vm_ssh_host: "{{ vm_name }}-ssh.{{ vm_namespace }}.svc.cluster.local"

    - name: Wait for SSH and register VM host
      block:
        - name: Wait for SSH to become reachable
          ansible.builtin.wait_for:
            host: "{{ vm_ssh_host }}"
            port: 22
            timeout: 300
            delay: 10

        - name: Add VM to in-memory inventory
          ansible.builtin.add_host:
            name: "{{ vm_name }}"
            ansible_host: "{{ vm_ssh_host }}"
            ansible_user: "{{ vm_user }}"
            ansible_ssh_pass: "{{ vm_password }}"
            ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            groups: provisioned_vms
            vm_name: "{{ vm_name }}"
            vm_namespace: "{{ vm_namespace }}"
            vm_user: "{{ vm_user }}"
            service_account_user: "{{ service_account_user }}"
            ssh_public_key: "{{ ssh_public_key }}"

        - name: Mark SSH as reachable
          set_fact:
            ssh_reachable: true

      rescue:
        - name: SSH not reachable — VM created but app stack will be skipped
          ansible.builtin.debug:
            msg: "SSH wait timed out for {{ vm_ssh_host }}. VM is created but NGINX setup will be skipped. Callback will still fire."

        - name: Mark SSH as unreachable
          set_fact:
            ssh_reachable: false

    # ── Callback notification (in Play 1 so it ALWAYS fires) ───────────────
    - name: Build app route URL
      set_fact:
        app_route: "{{ vm_name }}-{{ vm_namespace }}.{{ lookup('env', 'CLUSTER_DOMAIN') | default('apps.example.com', true) }}"

    - name: Output VM details
      ansible.builtin.debug:
        msg:
          - "================================================"
          - "VM Provisioned Successfully!"
          - "================================================"
          - "VM Name: {{ vm_name }}"
          - "Namespace: {{ vm_namespace }}"
          - "CPUs: {{ vm_cpus }}"
          - "Memory: {{ vm_memory }}"
          - "Disk Size: {{ vm_disk_size }}"
          - "RHEL Version: {{ rhel_version }}"
          - ""
          - "Application:"
          - "  URL: https://{{ app_route }}"
          - ""
          - "Access:"
          - "  Service Account: {{ service_account_user }}"
          - "  SSH: ssh {{ service_account_user }}@{{ vm_ssh_host }}"
          - "================================================"

    - name: Set stats for AAP/Developer Hub
      ansible.builtin.set_stats:
        data:
          vm_name: "{{ vm_name }}"
          vm_namespace: "{{ vm_namespace }}"
          vm_cpus: "{{ vm_cpus }}"
          vm_memory: "{{ vm_memory }}"
          vm_disk_size: "{{ vm_disk_size }}"
          rhel_version: "{{ rhel_version }}"
          vm_ready: true
          vm_status: Running
          ssh_service: "{{ vm_ssh_host }}"
          service_account: "{{ service_account_user }}"
          app_url: "https://{{ app_route }}"

    - name: Notify SonataFlow workflow of VM provisioning completion
      uri:
        url: "{{ workflow_callback_url }}"
        method: POST
        body_format: json
        headers:
          Content-Type: application/json
          ce-specversion: "1.0"
          ce-type: vmProvisioningComplete
          ce-source: aap
          ce-id: "{{ vm_name }}-provisioned"
          ce-kogitoprocrefid: "{{ workflow_instance_id }}"
        body:
          vm_provisioned: true
          vm_name: "{{ vm_name }}"
          vm_namespace: "{{ vm_namespace }}"
          vm_status: Running
          ssh_service: "{{ vm_ssh_host }}"
          service_account: "{{ service_account_user }}"
          app_url: "https://{{ app_route }}"
        validate_certs: false
        status_code: [200, 201, 202, 204]
      when: workflow_callback_url is defined and workflow_callback_url | length > 0
      ignore_errors: true

# ── Play 2: Deploy Python web app from PyPI ───────────────────────────────
- name: Deploy Web Application from PyPI
  hosts: provisioned_vms
  gather_facts: true
  become: true

  tasks:
    - name: Deploy web application
      block:
        - name: Create application directory
          ansible.builtin.file:
            path: /opt/app
            state: directory
            mode: "0755"

        - name: Install pip from PyPI (bootstrap)
          ansible.builtin.shell: |
            PY_VER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            curl -sSL "https://bootstrap.pypa.io/pip/${PY_VER}/get-pip.py" | python3
          args:
            creates: /usr/local/bin/pip3

        - name: Install Flask web framework from PyPI
          ansible.builtin.command:
            cmd: python3 -m pip install flask

        - name: Write application config (Ansible variables)
          ansible.builtin.copy:
            dest: /opt/app/config.json
            mode: "0644"
            content: |
              {"app_name": "{{ vm_name }}", "namespace": "{{ vm_namespace }}", "svc_account": "{{ service_account_user }}"}

        - name: Deploy Flask application
          ansible.builtin.copy:
            dest: /opt/app/app.py
            mode: "0644"
            content: !unsafe |
              from flask import Flask, jsonify
              import socket, platform, datetime, os, json

              with open("/opt/app/config.json") as f:
                  cfg = json.load(f)

              APP_NAME = cfg["app_name"]
              NAMESPACE = cfg["namespace"]
              SVC_ACCOUNT = cfg["svc_account"]

              app = Flask(__name__)

              STYLE = """
              body { font-family: 'Red Hat Display', sans-serif; background: #151515; color: #e0e0e0;
                     display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
              .card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
                      padding: 40px; max-width: 640px; text-align: center; }
              h1 { color: #ee0000; } h2 { color: #06c; }
              table { margin: 20px auto; border-collapse: collapse; text-align: left; }
              td, th { padding: 8px 16px; border-bottom: 1px solid #333; }
              .badge { background: #1e4620; color: #4caf50; padding: 4px 12px;
                       border-radius: 12px; font-size: 14px; }
              .allowed { color: #4caf50; } .denied { color: #ef5350; }
              code { background: #2a2a2a; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
              .rule-box { background: #0d1117; border: 1px solid #333; border-radius: 6px;
                          padding: 16px; font-family: monospace; font-size: 13px; margin: 16px 0;
                          white-space: pre-wrap; }
              """

              @app.route("/")
              def index():
                  uptime = os.popen("uptime -p").read().strip()
                  now = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S")
                  return f"""<!DOCTYPE html><html><head><title>{APP_NAME}</title>
              <style>{STYLE}</style></head>
              <body><div class="card">
                <h1>{APP_NAME}</h1>
                <h2>Self-Service VM &mdash; Deployed via Developer Hub</h2>
                <p><span class="badge">&#x2714; Running</span></p>
                <table>
                  <tr><th>Hostname</th><td>{socket.gethostname()}</td></tr>
                  <tr><th>Kernel</th><td>{platform.release()}</td></tr>
                  <tr><th>Uptime</th><td>{uptime}</td></tr>
                  <tr><th>Server Time</th><td>{now}</td></tr>
                  <tr><th>Python</th><td>{platform.python_version()}</td></tr>
                </table>
                <p style="margin-top:24px;font-size:13px;color:#666;">
                  Flask app installed from <a href="https://pypi.org/project/Flask/" style="color:#06c;">PyPI</a>
                  &bull; Provisioned by AAP + SonataFlow
                </p>
              </div></body></html>"""

              @app.route("/health")
              def health():
                  return jsonify(status="healthy", app=APP_NAME, host=socket.gethostname())

              @app.route("/api/info")
              def info():
                  return jsonify(
                      app=APP_NAME, namespace=NAMESPACE,
                      hostname=socket.gethostname(), kernel=platform.release(),
                      python=platform.python_version(),
                      time=datetime.datetime.now().isoformat()
                  )

              @app.route("/access")
              def access():
                  sudoers_file = f"/etc/sudoers.d/{SVC_ACCOUNT}"
                  try:
                      with open(sudoers_file) as f:
                          sudo_rules = f.read().strip()
                  except FileNotFoundError:
                      sudo_rules = "No sudoers file found"
                  parts = sudo_rules.split("NOPASSWD:")
                  allowed = [c.strip() for c in parts[-1].split(",")] if len(parts) > 1 else []
                  allowed_rows = "".join(
                      f'<tr><td><code>{c}</code></td><td class="allowed">ALLOWED</td></tr>' for c in allowed
                  )
                  return f"""<!DOCTYPE html><html><head><title>{APP_NAME} — Access</title>
              <style>{STYLE} .card {{ max-width: 700px; text-align: left; }}</style></head>
              <body><div class="card" style="text-align:left;">
                <h1 style="text-align:center;">Access Control</h1>
                <h2>Service Account: <code>{SVC_ACCOUNT}</code></h2>
                <table>
                  <tr><th>Property</th><th>Value</th></tr>
                  <tr><td>Username</td><td><code>{SVC_ACCOUNT}</code></td></tr>
                  <tr><td>Shell</td><td><code>/bin/bash</code></td></tr>
                  <tr><td>Sudo Access</td><td>Limited (NOPASSWD)</td></tr>
                </table>
                <h2>Allowed Commands (sudo)</h2>
                <div class="rule-box">{sudo_rules}</div>
                <table>
                  <tr><th>Command</th><th>Access</th></tr>
                  {allowed_rows}
                  <tr><td><code>yum / dnf install *</code></td><td class="denied">DENIED</td></tr>
                  <tr><td><code>useradd / userdel</code></td><td class="denied">DENIED</td></tr>
                  <tr><td><code>rm -rf /</code></td><td class="denied">DENIED</td></tr>
                  <tr><td><code>shutdown / reboot</code></td><td class="denied">DENIED</td></tr>
                </table>
                <p style="margin-top:24px;font-size:13px;color:#666;text-align:center;">
                  Principle of least privilege &mdash; enforced by Ansible Automation Platform
                </p>
              </div></body></html>"""

              if __name__ == "__main__":
                  app.run(host="0.0.0.0", port=80)

        - name: Create systemd service for web application
          ansible.builtin.copy:
            dest: /etc/systemd/system/webapp.service
            mode: "0644"
            content: |
              [Unit]
              Description=Flask Web Application
              After=network.target
              [Service]
              Type=simple
              WorkingDirectory=/opt/app
              ExecStart=/usr/bin/python3 /opt/app/app.py
              Restart=always
              RestartSec=3
              [Install]
              WantedBy=multi-user.target

        - name: Start and enable web application
          ansible.builtin.systemd:
            name: webapp
            state: started
            enabled: true
            daemon_reload: true

        - name: Verify application is responding
          ansible.builtin.uri:
            url: http://localhost:80
            status_code: 200
          register: health_check
          retries: 5
          delay: 3

        - name: Create service account user
          ansible.builtin.user:
            name: "{{ service_account_user }}"
            comment: "Service account for {{ vm_name }}"
            shell: /bin/bash
            create_home: true

        - name: Grant limited sudo for app management
          ansible.builtin.copy:
            dest: "/etc/sudoers.d/{{ service_account_user }}"
            mode: "0440"
            content: |
              {{ service_account_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart webapp, /usr/bin/systemctl status webapp, /usr/bin/journalctl -u webapp*
            validate: /usr/sbin/visudo -cf %s

        - name: Inject SSH public key for service account
          ansible.posix.authorized_key:
            user: "{{ service_account_user }}"
            key: "{{ ssh_public_key }}"
            state: present
          when: ssh_public_key is defined and ssh_public_key | length > 0

      rescue:
        - name: Application deployment encountered errors
          ansible.builtin.debug:
            msg: "App deployment had issues — VM is provisioned, app may need manual attention."
